<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お知らせ — Dasopedia</title>
  <script>(function(){ document.documentElement.setAttribute('data-theme', localStorage.getItem('dasopedia-theme') || 'light'); })();</script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    [data-theme="light"] { --bg: #f5f6fa; --surface: #ffffff; --border: #e2e4ed; --accent: #4f6de0; --accent-hover: #3d5acc; --text: #1a1d2e; --text-muted: #6b7080; --font: 'Inter', 'Hiragino Sans', sans-serif; }
    [data-theme="dark"]  { --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3e; --accent: #6c8bef; --accent-hover: #8aa3f5; --text: #e8eaf0; --text-muted: #7b7f96; --font: 'Inter', 'Hiragino Sans', sans-serif; }
    body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; display: flex; flex-direction: column; }
    nav { background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 32px; height: 56px; position: sticky; top: 0; z-index: 100; }
    .nav-logo { font-size: 16px; font-weight: 700; color: var(--text); text-decoration: none; }
    .nav-logo span { color: var(--accent); }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .nav-link { color: var(--text-muted); font-size: 13px; text-decoration: none; }
    .nav-link:hover { color: var(--text); }
    .btn-sm { background: var(--accent); border: none; border-radius: 7px; color: #fff; cursor: pointer; font-family: var(--font); font-size: 13px; font-weight: 600; padding: 7px 14px; text-decoration: none; }
    .btn-icon { background: none; border: 1px solid var(--border); border-radius: 7px; color: var(--text); cursor: pointer; font-size: 15px; padding: 5px 10px; }
    .main { max-width: 760px; width: 100%; margin: 0 auto; padding: 40px 24px; flex: 1; }
    h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 24px; }
    .notice-list { display: flex; flex-direction: column; gap: 10px; }
    .notice-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px 24px; text-decoration: none; color: var(--text); transition: border-color 0.15s; display: flex; align-items: flex-start; gap: 16px; }
    .notice-card:hover { border-color: var(--accent); }
    .notice-card.unread { border-left: 3px solid var(--accent); }
    .notice-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex-shrink: 0; margin-top: 6px; }
    .notice-dot.read { background: transparent; }
    .notice-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .notice-meta { font-size: 12px; color: var(--text-muted); }
    .notice-excerpt { font-size: 13px; color: var(--text-muted); margin-top: 6px; line-height: 1.5; }
    .empty { color: var(--text-muted); font-size: 14px; text-align: center; padding: 48px; }
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    @media (max-width: 680px) { nav { padding: 0 16px; } .main { padding: 24px 16px; } }
  </style>
  <link rel="icon" type="image/png" href="/icon.png">
  <link rel="apple-touch-icon" href="/icon.png">
</head>
<body>
  <nav>
    <a class="nav-logo" href="/"><span>D</span>asopedia</a>
    <div class="nav-right">
      <a class="nav-link" href="/">ホーム</a>
      <button class="btn-icon" id="theme-toggle" onclick="window.themeToggle()">🌙</button>
      <a class="nav-link" href="#" onclick="doLogout()">ログアウト</a>
    </div>
  </nav>

  <div class="main">
    <div class="page-header">
      <h1>📢 お知らせ</h1>
      <a class="btn-sm" href="/notices/edit/" id="write-btn" style="display:none">+ 投稿する</a>
    </div>
    <div class="notice-list" id="notice-list"><div class="empty">読み込み中...</div></div>
  </div>

  <footer style="border-top:1px solid var(--border);padding:24px 32px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">
    <span style="font-size:12px;color:var(--text-muted)">© Dasopedia</span>
    <div style="display:flex;gap:16px">
      <a href="/legal/" style="font-size:12px;color:var(--text-muted);text-decoration:none">利用規約</a>
      <a href="/legal/privacy/" style="font-size:12px;color:var(--text-muted);text-decoration:none">プライバシーポリシー</a>
    </div>
  </footer>

  <script type="module">
    import { toggleTheme, updateToggleButton } from 'https://dasopedia.f5.si/js/theme.js';
    import { requireAuth, logout } from 'https://dasopedia.f5.si/js/auth.js';
    import { db, rtdb } from 'https://dasopedia.f5.si/js/firebase.js';
    import { collection, query, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { ref, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    window.themeToggle = toggleTheme;
    window.doLogout = logout;
    updateToggleButton();

    const READ_KEY = 'dasopedia-read-notices';
    function getReadIds() { try { return JSON.parse(localStorage.getItem(READ_KEY) || '[]'); } catch { return []; } }

    requireAuth(async (user, userData) => {
      // 投稿権限チェック
      try {
        const cfgSnap = await get(ref(rtdb, 'config/noticeRole'));
        const noticeRole = cfgSnap.exists() ? cfgSnap.val() : 'admin';
        const roleOrder = ['viewer','editor','admin','owner'];
        const myIdx     = roleOrder.indexOf(userData.role);
        const reqIdx    = roleOrder.indexOf(noticeRole);
        if (myIdx >= reqIdx) document.getElementById('write-btn').style.display = 'block';
      } catch(e) {}

      try {
        const snap = await getDocs(query(collection(db, 'notices'), orderBy('createdAt', 'desc')));
        const list = document.getElementById('notice-list');
        const readIds = getReadIds();

        if (snap.empty) { list.innerHTML = '<div class="empty">お知らせはありません。</div>'; return; }

        list.innerHTML = snap.docs
          .filter(d => d.data().isPublished)
          .map(d => {
            const notice  = d.data();
            const isRead  = readIds.includes(d.id);
            const date    = notice.createdAt ? new Date(notice.createdAt.toMillis()).toLocaleDateString('ja-JP') : '';
            const excerpt = (notice.content || '').replace(/[#*`_~\[\]()>!{}]/g, '').slice(0, 80);
            return `<a class="notice-card${isRead ? '' : ' unread'}" href="/notices/article/?id=${d.id}">
              <div class="notice-dot${isRead ? ' read' : ''}"></div>
              <div style="flex:1;min-width:0">
                <div class="notice-title">${notice.title}</div>
                <div class="notice-meta">${notice.createdByName || '運営'} · ${date}</div>
                ${excerpt ? `<div class="notice-excerpt">${excerpt}...</div>` : ''}
              </div>
            </a>`;
          }).join('') || '<div class="empty">お知らせはありません。</div>';
      } catch(e) {
        document.getElementById('notice-list').innerHTML = '<div class="empty">読み込みに失敗しました。</div>';
      }
    });
  </script>
</body>
</html>
