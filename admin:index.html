<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理パネル — Dasopedia</title>
  <script>
    (function() {
      const t = localStorage.getItem('dasopedia-theme') || 'light';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    [data-theme="light"] { --bg: #f5f6fa; --surface: #ffffff; --border: #e2e4ed; --accent: #4f6de0; --accent-hover: #3d5acc; --text: #1a1d2e; --text-muted: #6b7080; --error: #d63b3b; --success: #2a9d6f; --font: 'Inter', 'Hiragino Sans', sans-serif; }
    [data-theme="dark"]  { --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3e; --accent: #6c8bef; --accent-hover: #8aa3f5; --text: #e8eaf0; --text-muted: #7b7f96; --error: #ef6c6c; --success: #6cefb0; --font: 'Inter', 'Hiragino Sans', sans-serif; }
    body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }
    nav { background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 32px; height: 56px; position: sticky; top: 0; z-index: 100; }
    .nav-logo { font-size: 16px; font-weight: 700; color: var(--text); text-decoration: none; }
    .nav-logo span { color: var(--accent); }
    .nav-badge { background: var(--accent); border-radius: 4px; color: #fff; font-size: 10px; font-weight: 700; padding: 2px 6px; letter-spacing: 0.06em; margin-left: 8px; vertical-align: middle; }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .nav-link { color: var(--text-muted); font-size: 13px; text-decoration: none; }
    .nav-link:hover { color: var(--text); }
    .tb { background: none; border: 1px solid var(--border); border-radius: 7px; color: var(--text); cursor: pointer; font-size: 15px; padding: 5px 10px; }
    .main { max-width: 900px; margin: 0 auto; padding: 40px 24px; }
    h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 8px; }
    .subtitle { color: var(--text-muted); font-size: 14px; margin-bottom: 36px; }
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 40px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px 24px; }
    .stat-label { font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
    .stat-value { font-size: 32px; font-weight: 700; letter-spacing: -0.03em; color: var(--accent); }
    .section-title { font-size: 13px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 16px; }
    .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .menu-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; text-decoration: none; color: var(--text); transition: border-color 0.15s; display: flex; align-items: flex-start; gap: 16px; }
    .menu-card:hover { border-color: var(--accent); }
    .menu-card.owner-only { border-style: dashed; }
    .menu-card.owner-only:hover { border-color: #efb46c; border-style: solid; }
    .menu-icon { font-size: 24px; flex-shrink: 0; }
    .menu-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .menu-desc { font-size: 13px; color: var(--text-muted); line-height: 1.5; }
    .owner-badge { background: rgba(239,180,108,0.15); border: 1px solid rgba(239,180,108,0.3); border-radius: 4px; color: #efb46c; font-size: 10px; font-weight: 700; padding: 2px 6px; margin-left: 8px; letter-spacing: 0.06em; }
  </style>
</head>
<body>
  <nav>
    <a class="nav-logo" href="/"><span>D</span>asopedia <span class="nav-badge">ADMIN</span></a>
    <div class="nav-right">
      <a class="nav-link" href="/">ホーム</a>
      <button class="tb" id="theme-toggle" onclick="window.themeToggle()">🌙</button>
      <a class="nav-link" href="#" onclick="doLogout()">ログアウト</a>
    </div>
  </nav>
  <div class="main">
    <h1>管理パネル</h1>
    <p class="subtitle" id="admin-subtitle">読み込み中...</p>

    <div class="stats" id="stats">
      <div class="stat-card"><div class="stat-label">記事数</div><div class="stat-value" id="stat-articles">-</div></div>
      <div class="stat-card"><div class="stat-label">ユーザー数</div><div class="stat-value" id="stat-users">-</div></div>
      <div class="stat-card"><div class="stat-label">タグ数</div><div class="stat-value" id="stat-tags">-</div></div>
    </div>

    <div class="section-title">管理メニュー</div>
    <div class="menu-grid">
      <a class="menu-card" href="/admin/users/">
        <div class="menu-icon">👥</div>
        <div>
          <div class="menu-title">ユーザー管理</div>
          <div class="menu-desc">ユーザー一覧の確認、ロールの変更、BANの付与・解除</div>
        </div>
      </a>
      <a class="menu-card" href="/admin/articles/">
        <div class="menu-icon">📝</div>
        <div>
          <div class="menu-title">記事管理</div>
          <div class="menu-desc">全記事の閲覧、強制編集・削除</div>
        </div>
      </a>
      <a class="menu-card owner-only" href="/admin/owner/" id="owner-card" style="display:none">
        <div class="menu-icon">👑</div>
        <div>
          <div class="menu-title">owner設定 <span class="owner-badge">OWNER ONLY</span></div>
          <div class="menu-desc">owner専用の設定・管理</div>
        </div>
      </a>
    </div>
  </div>

  <script type="module">
    import { toggleTheme, updateToggleButton } from 'https://dasopedia.f5.si/js/theme.js';
    import { requireAdmin, logout } from 'https://dasopedia.f5.si/js/auth.js';
    import { db, rtdb } from 'https://dasopedia.f5.si/js/firebase.js';
    import { collection, getCountFromServer } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { ref, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    window.themeToggle = toggleTheme;
    window.doLogout = logout;
    updateToggleButton();

    requireAdmin(async (user, userData) => {
      document.getElementById('admin-subtitle').textContent =
        `ログイン中: ${userData.displayName || user.displayName} (${userData.role})`;

      if (userData.role === 'owner') {
        document.getElementById('owner-card').style.display = 'flex';
      }

      try {
        const [articlesSnap, usersSnap, tagsSnap] = await Promise.all([
          getCountFromServer(collection(db, 'articles')),
          get(ref(rtdb, 'users')),
          getCountFromServer(collection(db, 'tags')),
        ]);
        document.getElementById('stat-articles').textContent = articlesSnap.data().count;
        document.getElementById('stat-users').textContent = usersSnap.exists() ? Object.keys(usersSnap.val()).length : 0;
        document.getElementById('stat-tags').textContent = tagsSnap.data().count;
      } catch (e) {
        console.error('stats error:', e);
      }
    });
  </script>
</body>
</html>
