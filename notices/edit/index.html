<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お知らせを投稿 — Dasopedia</title>
  <script>(function(){ document.documentElement.setAttribute('data-theme', localStorage.getItem('dasopedia-theme') || 'light'); })();</script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    [data-theme="light"] { --bg: #f5f6fa; --surface: #ffffff; --border: #e2e4ed; --accent: #4f6de0; --accent-hover: #3d5acc; --text: #1a1d2e; --text-muted: #6b7080; --error: #d63b3b; --success: #2a9d6f; --font: 'Inter', 'Hiragino Sans', sans-serif; --font-mono: monospace; }
    [data-theme="dark"]  { --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3e; --accent: #6c8bef; --accent-hover: #8aa3f5; --text: #e8eaf0; --text-muted: #7b7f96; --error: #ef6c6c; --success: #6cefb0; --font: 'Inter', 'Hiragino Sans', sans-serif; --font-mono: monospace; }
    body { background: var(--bg); color: var(--text); font-family: var(--font); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    nav { background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; padding: 0 16px; height: 56px; flex-shrink: 0; }
    .nav-logo { font-size: 15px; font-weight: 700; color: var(--text); text-decoration: none; flex-shrink: 0; }
    .nav-logo span { color: var(--accent); }
    .nav-mode { font-size: 13px; color: var(--text-muted); flex: 1; text-align: center; }
    .btn-nav { background: none; border: 1px solid var(--border); border-radius: 7px; color: var(--text-muted); cursor: pointer; font-family: var(--font); font-size: 13px; padding: 6px 12px; text-decoration: none; transition: border-color 0.15s; white-space: nowrap; }
    .btn-nav:hover { border-color: var(--accent); color: var(--text); }
    .btn-save { background: var(--accent); border: none; border-radius: 7px; color: #fff; cursor: pointer; font-family: var(--font); font-size: 13px; font-weight: 600; padding: 7px 16px; transition: background 0.15s; }
    .btn-save:hover:not(:disabled) { background: var(--accent-hover); }
    .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-icon { background: none; border: 1px solid var(--border); border-radius: 7px; color: var(--text); cursor: pointer; font-size: 15px; padding: 5px 9px; }
    .publish-toggle { display: flex; align-items: center; gap: 8px; padding: 6px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 7px; cursor: pointer; font-size: 12px; color: var(--text-muted); white-space: nowrap; }
    .publish-toggle.published { border-color: #2a9d6f; color: #2a9d6f; background: rgba(42,157,111,0.06); }
    [data-theme="dark"] .publish-toggle.published { color: #6cefb0; border-color: #6cefb0; }
    .toggle-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
    .editor-area { display: flex; flex: 1; overflow: hidden; }
    .editor-left { display: flex; flex-direction: column; flex: 1; border-right: 1px solid var(--border); overflow: hidden; }
    .editor-meta { padding: 12px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .meta-input { background: var(--bg); border: 1px solid var(--border); border-radius: 7px; color: var(--text); font-family: var(--font); font-size: 14px; font-weight: 600; padding: 10px 12px; outline: none; width: 100%; transition: border-color 0.15s; }
    .meta-input:focus { border-color: var(--accent); }
    .toolbar { display: flex; gap: 3px; padding: 6px 10px; border-bottom: 1px solid var(--border); background: var(--surface); flex-wrap: wrap; flex-shrink: 0; }
    .tb-btn { background: none; border: 1px solid transparent; border-radius: 5px; color: var(--text-muted); cursor: pointer; font-family: var(--font-mono); font-size: 12px; padding: 3px 7px; transition: all 0.1s; }
    .tb-btn:hover { background: var(--bg); border-color: var(--border); color: var(--text); }
    .editor-textarea { flex: 1; background: var(--bg); border: none; color: var(--text); font-family: var(--font-mono); font-size: 14px; line-height: 1.75; padding: 16px 20px; resize: none; outline: none; overflow-y: auto; }
    .editor-right { flex: 1; overflow-y: auto; padding: 24px 28px; }
    .preview-label { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 16px; }
    .preview-body h2 { font-size: 19px; font-weight: 700; border-bottom: 1px solid var(--border); padding-bottom: 6px; margin: 22px 0 10px; }
    .preview-body h3 { font-size: 16px; font-weight: 700; margin: 18px 0 8px; }
    .preview-body p { font-size: 14px; line-height: 1.8; margin-bottom: 12px; }
    .preview-body ul, .preview-body ol { margin: 0 0 12px 22px; }
    .preview-body li { font-size: 14px; line-height: 1.8; }
    .preview-body code { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; font-family: var(--font-mono); font-size: 12px; padding: 2px 5px; }
    .preview-body pre { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin: 12px 0; overflow-x: auto; }
    .preview-body blockquote { border-left: 3px solid var(--accent); margin: 12px 0; padding: 8px 16px; color: var(--text-muted); }
    .preview-body a { color: var(--accent); }
    .toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 18px; font-size: 13px; display: none; z-index: 999; }
    .toast.show { display: block; }
    .toast.success { border-color: rgba(42,157,111,0.4); color: var(--success); }
    .toast.error { border-color: rgba(214,59,59,0.4); color: var(--error); }
    @media (max-width: 640px) {
      .editor-area { flex-direction: column; }
      .editor-left { border-right: none; border-bottom: 1px solid var(--border); max-height: 50vh; }
      .editor-right { max-height: 40vh; padding: 16px; }
    }
  </style>
</head>
<body>
  <nav>
    <a class="nav-logo" href="/"><span>D</span>asopedia</a>
    <div class="nav-mode" id="nav-mode">お知らせを投稿</div>
    <a class="btn-nav" href="/notices/">キャンセル</a>
    <div class="publish-toggle" id="publish-toggle" onclick="togglePublish()">
      <div class="toggle-dot"></div>
      <span id="publish-label">下書き</span>
    </div>
    <button class="btn-icon" id="theme-toggle" onclick="window.themeToggle()">🌙</button>
    <button class="btn-save" id="saveBtn" onclick="doSave()">保存</button>
  </nav>

  <div class="editor-area">
    <div class="editor-left">
      <div class="editor-meta">
        <input class="meta-input" id="title-input" placeholder="お知らせタイトル">
      </div>
      <div class="toolbar">
        <button class="tb-btn" onclick="ins('**','**')"><b>B</b></button>
        <button class="tb-btn" onclick="ins('*','*')"><i>I</i></button>
        <button class="tb-btn" onclick="ins('`','`')">code</button>
        <button class="tb-btn" onclick="insLine('## ')">H2</button>
        <button class="tb-btn" onclick="insLine('### ')">H3</button>
        <button class="tb-btn" onclick="insLine('- ')">リスト</button>
        <button class="tb-btn" onclick="insLine('> ')">引用</button>
        <button class="tb-btn" onclick="ins('[','](url)')">リンク</button>
        <button class="tb-btn" onclick="insWrap('{info}','{/info}')" style="color:#6c8bef">INFO</button>
        <button class="tb-btn" onclick="insWrap('{warn}','{/warn}')" style="color:#efb46c">WARN</button>
        <button class="tb-btn" onclick="insWrap('{danger}','{/danger}')" style="color:#ef6c6c">DANGER</button>
      </div>
      <textarea class="editor-textarea" id="editor" placeholder="お知らせの内容を書く..." oninput="updatePreview()"></textarea>
    </div>
    <div class="editor-right">
      <div class="preview-label">プレビュー</div>
      <div class="preview-body" id="preview"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module">
    import { toggleTheme, updateToggleButton } from 'https://dasopedia.f5.si/js/theme.js';
    import { requireAuth, logout } from 'https://dasopedia.f5.si/js/auth.js';
    import { db, rtdb } from 'https://dasopedia.f5.si/js/firebase.js';
    import { collection, doc, getDoc, addDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { ref, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
    import { applyCustomMarkdown } from 'https://dasopedia.f5.si/js/custom-markdown.js';

    window.themeToggle = toggleTheme;
    updateToggleButton();

    let currentUser, currentUserData;
    let isPublished = false;
    const params   = new URLSearchParams(location.search);
    const noticeId = params.get('id') || null;
    if (noticeId) document.getElementById('nav-mode').textContent = 'お知らせを編集';

    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg; t.className = `toast show ${type}`;
      setTimeout(() => t.className = 'toast', 3000);
    }

    function syncPublishUI() {
      const tog = document.getElementById('publish-toggle');
      const lbl = document.getElementById('publish-label');
      tog.classList.toggle('published', isPublished);
      lbl.textContent = isPublished ? '公開' : '下書き';
    }
    window.togglePublish = function() { isPublished = !isPublished; syncPublishUI(); };

    window.updatePreview = function() {
      let html = marked.parse(document.getElementById('editor').value || '');
      html = applyCustomMarkdown(html);
      document.getElementById('preview').innerHTML = html;
    };

    function getTA() { return document.getElementById('editor'); }
    window.ins = function(b, a) {
      const ta = getTA(), s = ta.selectionStart, e = ta.selectionEnd;
      ta.value = ta.value.slice(0,s)+b+ta.value.slice(s,e)+a+ta.value.slice(e);
      ta.setSelectionRange(s+b.length, e+b.length); ta.focus(); updatePreview();
    };
    window.insLine = function(p) {
      const ta = getTA(), s = ta.selectionStart;
      const ls = ta.value.lastIndexOf('\n', s-1)+1;
      ta.value = ta.value.slice(0,ls)+p+ta.value.slice(ls);
      ta.setSelectionRange(s+p.length, s+p.length); ta.focus(); updatePreview();
    };
    window.insWrap = function(b, a) {
      const ta = getTA(), s = ta.selectionStart, e = ta.selectionEnd;
      const sel = ta.value.slice(s,e) || 'テキスト';
      ta.value = ta.value.slice(0,s)+b+sel+a+ta.value.slice(e);
      ta.setSelectionRange(s+b.length, s+b.length+sel.length); ta.focus(); updatePreview();
    };

    window.doSave = async function() {
      const title   = document.getElementById('title-input').value.trim();
      const content = getTA().value;
      if (!title)        { showToast('タイトルを入力してください。', 'error'); return; }
      if (!content.trim()) { showToast('本文を入力してください。', 'error'); return; }
      const btn = document.getElementById('saveBtn');
      btn.disabled = true; btn.textContent = '保存中...';
      try {
        if (noticeId) {
          await updateDoc(doc(db, 'notices', noticeId), { title, content, isPublished, updatedAt: serverTimestamp() });
          showToast('保存しました！');
        } else {
          const ref2 = await addDoc(collection(db, 'notices'), {
            title, content, isPublished,
            createdBy: currentUser.uid,
            createdByName: currentUserData.displayName || currentUser.displayName || '運営',
            createdAt: serverTimestamp(), updatedAt: serverTimestamp()
          });
          showToast('投稿しました！');
          setTimeout(() => window.location.href = `/notices/article/?id=${ref2.id}`, 1200);
        }
      } catch(e) { showToast(`保存に失敗しました: ${e.message}`, 'error'); }
      btn.disabled = false; btn.textContent = '保存';
    };

    document.addEventListener('keydown', e => { if ((e.ctrlKey||e.metaKey)&&e.key==='s') { e.preventDefault(); doSave(); } });

    requireAuth(async (user, userData) => {
      currentUser = user; currentUserData = userData;

      // 投稿権限チェック
      try {
        const cfgSnap = await get(ref(rtdb, 'config/noticeRole'));
        const noticeRole = cfgSnap.exists() ? cfgSnap.val() : 'admin';
        const roleOrder  = ['viewer','editor','admin','owner'];
        if (roleOrder.indexOf(userData.role) < roleOrder.indexOf(noticeRole)) {
          window.location.href = '/notices/'; return;
        }
      } catch(e) {}

      if (noticeId) {
        try {
          const snap = await getDoc(doc(db, 'notices', noticeId));
          if (snap.exists()) {
            const d = snap.data();
            document.getElementById('title-input').value = d.title || '';
            getTA().value = d.content || '';
            isPublished = d.isPublished || false;
            syncPublishUI(); updatePreview();
          }
        } catch(e) { showToast('読み込みに失敗しました。', 'error'); }
      }
    });
  </script>
</body>
</html>
