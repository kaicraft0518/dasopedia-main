<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dasopedia</title>
  <script>(function(){ document.documentElement.setAttribute('data-theme', localStorage.getItem('dasopedia-theme') || 'light'); })();</script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    [data-theme="light"] {
      --bg: #f5f6fa; --surface: #ffffff; --border: #e2e4ed;
      --accent: #4f6de0; --accent-hover: #3d5acc;
      --text: #1a1d2e; --text-muted: #6b7080;
      --error: #ef6c6c; --font: 'Inter', 'Hiragino Sans', sans-serif;
    }
    [data-theme="dark"] {
      --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3e;
      --accent: #6c8bef; --accent-hover: #8aa3f5;
      --text: #e8eaf0; --text-muted: #7b7f96;
      --error: #ef6c6c; --font: 'Inter', 'Hiragino Sans', sans-serif;
    }

    body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; display: flex; flex-direction: column; }

    /* ===== ナビ ===== */
    nav {
      background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 32px; height: 56px; position: sticky; top: 0; z-index: 100;
    }
    .nav-logo { font-size: 16px; font-weight: 700; color: var(--text); text-decoration: none; letter-spacing: -0.02em; flex-shrink: 0; }
    .nav-logo span { color: var(--accent); }

    /* PC用右側メニュー */
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .nav-search { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: var(--font); font-size: 13px; padding: 7px 12px; outline: none; width: 200px; transition: border-color 0.15s; }
    .nav-search:focus { border-color: var(--accent); }
    .nav-link { color: var(--text-muted); font-size: 13px; text-decoration: none; transition: color 0.15s; white-space: nowrap; }
    .nav-link:hover { color: var(--text); }
    .btn-sm { background: var(--accent); border: none; border-radius: 7px; color: #fff; cursor: pointer; font-family: var(--font); font-size: 13px; font-weight: 600; padding: 7px 14px; text-decoration: none; transition: background 0.15s; white-space: nowrap; }
    .btn-sm:hover { background: var(--accent-hover); }
    .btn-icon { background: none; border: 1px solid var(--border); border-radius: 7px; color: var(--text); cursor: pointer; font-size: 15px; padding: 5px 10px; transition: border-color 0.15s; flex-shrink: 0; }
    .btn-icon:hover { border-color: var(--accent); }

    /* アバター */
    .avatar-wrap { position: relative; flex-shrink: 0; }
    .avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--accent); border: 2px solid transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #fff; transition: border-color 0.15s; user-select: none; }
    .avatar:hover, .avatar.open { border-color: var(--accent-hover); }
    .avatar-dropdown { position: absolute; top: calc(100% + 10px); right: 0; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 8px; min-width: 200px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); display: none; z-index: 200; }
    [data-theme="dark"] .avatar-dropdown { box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
    .avatar-dropdown.open { display: block; }
    .dropdown-header { padding: 10px 12px 12px; border-bottom: 1px solid var(--border); margin-bottom: 6px; }
    .dropdown-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
    .dropdown-role { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--accent); }
    .dropdown-item { display: block; padding: 9px 12px; border-radius: 7px; font-size: 13px; color: var(--text-muted); text-decoration: none; cursor: pointer; transition: background 0.1s, color 0.1s; background: none; border: none; width: 100%; text-align: left; font-family: var(--font); }
    .dropdown-item:hover { background: var(--bg); color: var(--text); }
    .dropdown-item.danger { color: var(--error); }
    .dropdown-item.danger:hover { background: rgba(239,108,108,0.08); }
    .dropdown-divider { border: none; border-top: 1px solid var(--border); margin: 6px 0; }

    /* ハンバーガー（スマホのみ表示） */
    #hamburger { display: none; background: none; border: 1px solid var(--border); border-radius: 7px; color: var(--text); cursor: pointer; font-size: 18px; padding: 5px 10px; flex-shrink: 0; }

    /* ===== コンテンツ ===== */
    .main { max-width: 900px; width: 100%; margin: 0 auto; padding: 48px 24px; flex: 1; }
    .hero { margin-bottom: 48px; }
    .hero h1 { font-size: 36px; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 4px; }
    .hero-sub { font-size: 16px; color: var(--text-muted); margin-bottom: 8px; }
    .hero p { color: var(--text-muted); font-size: 15px; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .section-title { font-size: 13px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); }
    .article-grid { display: grid; gap: 12px; }
    .article-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px 24px; text-decoration: none; color: var(--text); transition: border-color 0.15s; display: flex; align-items: center; justify-content: space-between; }
    .article-card:hover { border-color: var(--accent); }
    .article-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .article-meta { font-size: 12px; color: var(--text-muted); }
    .tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
    .tag { background: rgba(108,139,239,0.12); border: 1px solid rgba(108,139,239,0.25); border-radius: 4px; color: var(--accent); font-size: 11px; font-weight: 600; padding: 2px 8px; }
    .arrow { color: var(--text-muted); font-size: 18px; flex-shrink: 0; }
    .empty { color: var(--text-muted); font-size: 14px; text-align: center; padding: 40px; }

    /* ===== スマホ対応 ===== */
    @media (max-width: 680px) {
      nav { padding: 0 16px; }
      /* PC用メニューを非表示 */
      .nav-right { display: none; }
      /* ハンバーガーを表示 */
      #hamburger { display: flex; align-items: center; justify-content: center; }

      /* スマホ用ドロワーメニュー */
      #mobile-menu {
        display: none; flex-direction: column;
        position: absolute; top: 56px; left: 0; right: 0;
        background: var(--surface); border-bottom: 1px solid var(--border);
        padding: 4px 0; z-index: 300; box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      }
      #mobile-menu.open { display: flex; }
      #mobile-menu input.nav-search {
        margin: 10px 16px; width: calc(100% - 32px);
        border-radius: 8px;
      }
      #mobile-menu .mob-item {
        padding: 13px 20px; font-size: 14px; color: var(--text-muted);
        text-decoration: none; border-bottom: 1px solid var(--border);
        display: block; transition: color 0.15s;
      }
      #mobile-menu .mob-item:last-child { border-bottom: none; }
      #mobile-menu .mob-item:hover { color: var(--text); }
      #mobile-menu .mob-item.accent { color: var(--accent); font-weight: 600; }
      #mobile-menu .mob-item.danger { color: var(--error); }
      #mobile-menu .mob-divider { border: none; border-top: 1px solid var(--border); margin: 4px 0; }
      #mobile-menu .mob-label { padding: 8px 20px 4px; font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); }

      .main { padding: 24px 16px; }
      .hero h1 { font-size: 26px; }
      .article-card { padding: 14px 16px; }
    }
  </style>
</head>
<body>
  <nav>
    <a class="nav-logo" href="/"><span>D</span>asopedia</a>

    <!-- PC用右側メニュー -->
    <div class="nav-right">
      <input class="nav-search" type="search" placeholder="記事を検索..." onkeydown="if(event.key==='Enter')goSearch(this.value)">
      <a class="nav-link" href="/wiki/">記事一覧</a>
      <a class="btn-sm" href="/edit/">+ 記事を書く</a>
      <button class="btn-icon" id="theme-toggle" onclick="window.themeToggle()" title="テーマ切り替え">🌙</button>
      <div class="avatar-wrap">
        <div class="avatar" id="avatar" onclick="toggleDropdown()"></div>
        <div class="avatar-dropdown" id="avatar-dropdown">
          <div class="dropdown-header">
            <div class="dropdown-name" id="dropdown-name">...</div>
            <div class="dropdown-role" id="dropdown-role">...</div>
          </div>
          <a class="dropdown-item" href="/accounts/">アカウント設定</a>
          <a class="dropdown-item" href="/admin/" id="admin-link" style="display:none">管理パネル</a>
          <hr class="dropdown-divider">
          <button class="dropdown-item danger" onclick="doLogout()">ログアウト</button>
        </div>
      </div>
    </div>

    <!-- スマホ用ハンバーガー -->
    <button id="hamburger" onclick="toggleMobileMenu()" aria-label="メニュー">☰</button>
  </nav>

  <!-- スマホ用ドロワーメニュー -->
  <div id="mobile-menu">
    <input class="nav-search" type="search" placeholder="記事を検索..." onkeydown="if(event.key==='Enter'){goSearch(this.value);closeMobileMenu()}">
    <a class="mob-item" href="/wiki/">記事一覧</a>
    <a class="mob-item accent" href="/edit/">+ 記事を書く</a>
    <div class="mob-divider"></div>
    <div class="mob-label" id="mob-username"></div>
    <a class="mob-item" href="/accounts/">アカウント設定</a>
    <a class="mob-item" href="/admin/" id="mob-admin-link" style="display:none">管理パネル</a>
    <div class="mob-divider"></div>
    <a class="mob-item" href="#" onclick="window.themeToggle();return false" id="mob-theme-btn">🌙 テーマ切り替え</a>
    <a class="mob-item danger" href="#" onclick="doLogout()">ログアウト</a>
  </div>

  <div class="main">
    <div class="hero">
      <h1>Dasopedia</h1>
      <p class="hero-sub">フリー蛇足辞典</p>
      <p id="welcome-msg">読み込み中...</p>
    </div>
    <div class="section-header">
      <div class="section-title">最近の記事</div>
      <a class="nav-link" href="/wiki/">すべて見る →</a>
    </div>
    <div class="article-grid" id="article-list"><div class="empty">読み込み中...</div></div>
  </div>

  <footer style="border-top:1px solid var(--border);padding:24px 32px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">
    <span style="font-size:12px;color:var(--text-muted)">© Dasopedia</span>
    <div style="display:flex;gap:16px">
      <a href="/legal/" style="font-size:12px;color:var(--text-muted);text-decoration:none">利用規約</a>
      <a href="/legal/privacy/" style="font-size:12px;color:var(--text-muted);text-decoration:none">プライバシーポリシー</a>
    </div>
  </footer>

  <script>
    function toggleMobileMenu() {
      document.getElementById('mobile-menu').classList.toggle('open');
    }
    function closeMobileMenu() {
      document.getElementById('mobile-menu').classList.remove('open');
    }
    document.addEventListener('click', function(e) {
      if (!e.target.closest('nav') && !e.target.closest('#mobile-menu')) {
        closeMobileMenu();
      }
      if (!e.target.closest('.avatar-wrap')) {
        var d = document.getElementById('avatar-dropdown');
        var a = document.getElementById('avatar');
        if (d) { d.classList.remove('open'); }
        if (a) { a.classList.remove('open'); }
      }
    });
  </script>

  <script type="module">
    import { toggleTheme, updateToggleButton } from 'https://dasopedia.f5.si/js/theme.js';
    import { requireAuth, logout } from 'https://dasopedia.f5.si/js/auth.js';
    import { db } from 'https://dasopedia.f5.si/js/firebase.js';
    import { collection, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    window.themeToggle = toggleTheme;
    window.doLogout = logout;
    window.goSearch = q => { if (q.trim()) window.location.href = `/search/?q=${encodeURIComponent(q.trim())}`; };
    updateToggleButton();

    window.toggleDropdown = function() {
      document.getElementById('avatar').classList.toggle('open');
      document.getElementById('avatar-dropdown').classList.toggle('open');
    };

    requireAuth(async (user, userData) => {
      const name = userData.displayName || user.displayName || 'メンバー';
      document.getElementById('welcome-msg').textContent = `ようこそ、${name} さん`;
      document.getElementById('avatar').textContent = name.charAt(0).toUpperCase();
      document.getElementById('dropdown-name').textContent = name;
      document.getElementById('dropdown-role').textContent = userData.role || 'viewer';
      document.getElementById('mob-username').textContent = name + ' (' + (userData.role || 'viewer') + ')';

      if (['owner','admin'].includes(userData.role)) {
        document.getElementById('admin-link').style.display = 'block';
        document.getElementById('mob-admin-link').style.display = 'block';
      }

      try {
        const q = query(collection(db, 'articles'), orderBy('updatedAt', 'desc'), limit(10));
        const snap = await getDocs(q);
        const list = document.getElementById('article-list');
        if (snap.empty) { list.innerHTML = '<div class="empty">まだ記事がありません。最初の記事を書いてみましょう！</div>'; return; }
        list.innerHTML = '';
        snap.forEach(doc => {
          const d = doc.data();
          const date = d.updatedAt ? new Date(d.updatedAt.toMillis()).toLocaleDateString('ja-JP') : '';
          const tagsHtml = (d.tags || []).map(t => `<span class="tag">${t}</span>`).join('');
          list.innerHTML += `<a class="article-card" href="/wiki/article/?slug=${encodeURIComponent(d.slug || doc.id)}">
            <div>
              <div class="article-title">${d.title}</div>
              <div class="article-meta">${d.createdByName || '不明'} · ${date}</div>
              ${tagsHtml ? `<div class="tags">${tagsHtml}</div>` : ''}
            </div>
            <div class="arrow">›</div>
          </a>`;
        });
      } catch (e) {
        document.getElementById('article-list').innerHTML = '<div class="empty">記事の読み込みに失敗しました。</div>';
      }
    });
  </script>
</body>
</html>
