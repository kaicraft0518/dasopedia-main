<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>記事を編集 — Dasopedia</title>
  <script>(function(){ document.documentElement.setAttribute('data-theme', localStorage.getItem('dasopedia-theme') || 'light'); })();</script>

  <!-- CodeMirror 6 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/6.65.7/codemirror.min.js"></script>

  <!-- marked -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- highlight.js -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" id="hljs-light">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" id="hljs-dark" disabled>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    [data-theme="light"] {
      --bg: #f5f6fa; --surface: #ffffff; --border: #e2e4ed;
      --accent: #4f6de0; --accent-hover: #3d5acc;
      --text: #1a1d2e; --text-muted: #6b7080;
      --error: #d63b3b; --success: #2a9d6f;
      --font: 'Inter', 'Hiragino Sans', sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
    }
    [data-theme="dark"] {
      --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3e;
      --accent: #6c8bef; --accent-hover: #8aa3f5;
      --text: #e8eaf0; --text-muted: #7b7f96;
      --error: #ef6c6c; --success: #6cefb0;
      --font: 'Inter', 'Hiragino Sans', sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
    }

    body { background: var(--bg); color: var(--text); font-family: var(--font); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    /* ナビ */
    nav { background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; padding: 0 16px; height: 56px; flex-shrink: 0; position: relative; z-index: 10; }
    .nav-logo { font-size: 15px; font-weight: 700; color: var(--text); text-decoration: none; flex-shrink: 0; }
    .nav-logo span { color: var(--accent); }
    .nav-mode { font-size: 13px; color: var(--text-muted); flex: 1; text-align: center; }
    .btn-nav { background: none; border: 1px solid var(--border); border-radius: 7px; color: var(--text-muted); cursor: pointer; font-family: var(--font); font-size: 13px; padding: 6px 12px; text-decoration: none; transition: border-color 0.15s, color 0.15s; white-space: nowrap; }
    .btn-nav:hover { border-color: var(--accent); color: var(--text); }
    .btn-save { background: var(--accent); border: none; border-radius: 7px; color: #fff; cursor: pointer; font-family: var(--font); font-size: 13px; font-weight: 600; padding: 7px 16px; transition: background 0.15s; white-space: nowrap; }
    .btn-save:hover:not(:disabled) { background: var(--accent-hover); }
    .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-icon { background: none; border: 1px solid var(--border); border-radius: 7px; color: var(--text); cursor: pointer; font-size: 15px; padding: 5px 9px; }

    /* 公開/非公開トグル */
    .visibility-toggle { display: flex; align-items: center; gap: 8px; padding: 6px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 7px; cursor: pointer; font-size: 12px; color: var(--text-muted); transition: all 0.15s; white-space: nowrap; }
    .visibility-toggle.public { border-color: #2a9d6f; color: #2a9d6f; background: rgba(42,157,111,0.06); }
    [data-theme="dark"] .visibility-toggle.public { color: #6cefb0; border-color: #6cefb0; }
    .toggle-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; flex-shrink: 0; }

    /* エディタエリア */
    .editor-area { display: flex; flex: 1; overflow: hidden; }
    .editor-left { display: flex; flex-direction: column; flex: 1; border-right: 1px solid var(--border); overflow: hidden; min-width: 0; }
    .editor-meta { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; }
    .meta-row { display: flex; gap: 8px; }
    .meta-input { background: var(--bg); border: 1px solid var(--border); border-radius: 7px; color: var(--text); font-family: var(--font); font-size: 13px; padding: 8px 11px; outline: none; transition: border-color 0.15s; }
    .meta-input:focus { border-color: var(--accent); }
    #title-input { font-size: 14px; font-weight: 600; flex: 1; }
    #slug-input { flex: 1; color: var(--text-muted); font-family: var(--font-mono); font-size: 11px; }
    #tags-input { width: 100%; }

    /* ツールバー */
    .toolbar { display: flex; gap: 3px; padding: 6px 10px; border-bottom: 1px solid var(--border); background: var(--surface); flex-wrap: wrap; align-items: center; flex-shrink: 0; }
    .tb-btn { background: none; border: 1px solid transparent; border-radius: 5px; color: var(--text-muted); cursor: pointer; font-family: var(--font-mono); font-size: 12px; padding: 3px 7px; transition: all 0.1s; white-space: nowrap; }
    .tb-btn:hover { background: var(--bg); border-color: var(--border); color: var(--text); }
    .tb-sep { width: 1px; height: 18px; background: var(--border); margin: 0 3px; flex-shrink: 0; }

    /* 色ボタン */
    .tb-color { width: 20px; height: 20px; border-radius: 4px; border: 2px solid transparent; cursor: pointer; transition: transform 0.1s; flex-shrink: 0; }
    .tb-color:hover { transform: scale(1.2); border-color: var(--text-muted); }

    /* テキストエリア（CodeMirrorの代わり） */
    .editor-textarea { flex: 1; background: var(--bg); border: none; color: var(--text); font-family: var(--font-mono); font-size: 14px; line-height: 1.75; padding: 16px 20px; resize: none; outline: none; overflow-y: auto; }

    /* プレビュー */
    .editor-right { flex: 1; overflow-y: auto; padding: 24px 28px; min-width: 0; }
    .preview-label { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 16px; }
    .preview-body h1 { font-size: 24px; font-weight: 700; margin: 24px 0 10px; }
    .preview-body h2 { font-size: 19px; font-weight: 700; border-bottom: 1px solid var(--border); padding-bottom: 6px; margin: 22px 0 10px; }
    .preview-body h3 { font-size: 16px; font-weight: 700; margin: 18px 0 8px; }
    .preview-body p { font-size: 14px; line-height: 1.8; margin-bottom: 12px; }
    .preview-body ul, .preview-body ol { margin: 0 0 12px 22px; }
    .preview-body li { font-size: 14px; line-height: 1.8; }
    .preview-body code { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; font-family: var(--font-mono); font-size: 12px; padding: 2px 5px; }
    .preview-body pre { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin: 12px 0; overflow-x: auto; }
    .preview-body pre code { background: none; border: none; padding: 0; font-size: 13px; }
    .preview-body blockquote { border-left: 3px solid var(--accent); margin: 12px 0; padding: 8px 16px; color: var(--text-muted); }
    .preview-body a { color: var(--accent); }
    .preview-body table { border-collapse: collapse; width: 100%; margin: 12px 0; }
    .preview-body th, .preview-body td { border: 1px solid var(--border); padding: 8px 12px; font-size: 14px; }
    .preview-body th { background: var(--surface); font-weight: 600; }
    .preview-body img { max-width: 100%; border-radius: 6px; }
    [data-theme="light"] #hljs-dark { display: none; }
    [data-theme="dark"]  #hljs-light { display: none; }
    [data-theme="dark"]  #hljs-dark  { display: block; }

    /* カラーピッカーポップアップ */
    .color-popup { position: absolute; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px; display: none; z-index: 200; box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
    .color-popup.open { display: block; }
    .color-grid { display: grid; grid-template-columns: repeat(5, 24px); gap: 6px; margin-bottom: 10px; }
    .size-popup { position: absolute; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 8px; display: none; z-index: 200; box-shadow: 0 4px 16px rgba(0,0,0,0.15); min-width: 100px; }
    .size-popup.open { display: block; }
    .size-item { display: block; width: 100%; background: none; border: none; border-radius: 6px; color: var(--text); cursor: pointer; font-family: var(--font); padding: 6px 12px; text-align: left; transition: background 0.1s; }
    .size-item:hover { background: var(--bg); }

    /* トースト */
    .toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 18px; font-size: 13px; display: none; z-index: 999; }
    .toast.show { display: block; }
    .toast.success { border-color: rgba(42,157,111,0.4); color: var(--success); }
    .toast.error { border-color: rgba(214,59,59,0.4); color: var(--error); }

    /* 共有モーダル */
    .share-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 16px; }
    .share-modal-overlay.open { display: flex; }
    .share-modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px; width: 100%; max-width: 440px; max-height: 80vh; overflow-y: auto; }
    .share-user-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .share-user-row:last-child { border-bottom: none; }
    .share-user-info { display: flex; align-items: center; gap: 10px; }
    .share-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0; }
    .share-btn-add { background: rgba(79,109,224,0.1); border: 1px solid rgba(79,109,224,0.3); border-radius: 6px; color: var(--accent); cursor: pointer; font-family: var(--font); font-size: 12px; font-weight: 600; padding: 5px 12px; }
    .share-btn-remove { background: rgba(214,59,59,0.08); border: 1px solid rgba(214,59,59,0.25); border-radius: 6px; color: var(--error); cursor: pointer; font-family: var(--font); font-size: 12px; padding: 5px 12px; }

    /* 画像モーダル */
    .img-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 16px; }
    .img-modal-overlay.open { display: flex; }
    .img-modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px; width: 100%; max-width: 420px; }
    .img-drop-zone { border: 2px dashed var(--border); border-radius: 10px; padding: 28px 20px; text-align: center; cursor: pointer; transition: border-color 0.15s, background 0.15s; margin-bottom: 14px; }
    .img-drop-zone:hover, .img-drop-zone.drag-over { border-color: var(--accent); background: rgba(79,109,224,0.04); }
    .img-drop-zone input[type="file"] { display: none; }
    .img-preview { display: none; margin-bottom: 14px; text-align: center; }
    .img-preview img { max-width: 100%; max-height: 180px; border-radius: 8px; border: 1px solid var(--border); }
    .modal-input { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: var(--font); font-size: 13px; padding: 9px 12px; outline: none; width: 100%; margin-bottom: 10px; transition: border-color 0.15s; }
    .modal-input:focus { border-color: var(--accent); }
    .img-upload-btn { background: var(--accent); border: none; border-radius: 8px; color: #fff; cursor: pointer; font-family: var(--font); font-size: 14px; font-weight: 600; padding: 11px; width: 100%; }
    .img-upload-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .img-progress { font-size: 13px; color: var(--text-muted); text-align: center; margin-top: 8px; display: none; }
    .img-progress.show { display: block; }

    /* サイズ変更モーダル */
    .resize-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 16px; }
    .resize-modal-overlay.open { display: flex; }
    .resize-modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px; width: 100%; max-width: 420px; max-height: 70vh; overflow-y: auto; }

    @media (max-width: 640px) {
      .editor-area { flex-direction: column; }
      .editor-left { border-right: none; border-bottom: 1px solid var(--border); max-height: 50vh; }
      .editor-right { max-height: 40vh; padding: 16px; }
      .nav-mode { display: none; }
      .toolbar { gap: 2px; padding: 4px 8px; }
    }
  </style>
  <script>
    function toggleNav() {}
    document.addEventListener('click', function(e) {
      if (!e.target.closest('.color-popup') && !e.target.closest('[onclick*="ColorPopup"]') && !e.target.closest('[onclick*="openColor"]')) {
        document.querySelectorAll('.color-popup').forEach(p => p.classList.remove('open'));
      }
      if (!e.target.closest('.size-popup') && !e.target.closest('[onclick*="SizePopup"]') && !e.target.closest('[onclick*="openSize"]')) {
        document.querySelectorAll('.size-popup').forEach(p => p.classList.remove('open'));
      }
    });
  </script>
</head>
<body>
  <nav>
    <a class="nav-logo" href="/"><span>D</span>asopedia</a>
    <div class="nav-mode" id="nav-mode">新規作成</div>
    <a class="btn-nav" href="/">ホーム</a>
    <a class="btn-nav" href="/wiki/">キャンセル</a>
    <div class="visibility-toggle" id="visibility-toggle" onclick="toggleVisibility()">
      <div class="toggle-dot"></div>
      <span id="visibility-label">非公開</span>
    </div>
    <button class="btn-nav" id="share-btn" onclick="openShareModal()" style="display:none">👥 共有</button>
    <button class="btn-icon" id="theme-toggle" onclick="window.themeToggle()">🌙</button>
    <div id="autosave-indicator" style="font-size:12px;color:var(--text-muted);white-space:nowrap;display:none"></div>
    <button class="btn-save" id="saveBtn" onclick="doSave()">保存</button>
  </nav>

  <div class="editor-area">
    <div class="editor-left">
      <div class="editor-meta">
        <div class="meta-row">
          <input class="meta-input" id="title-input" placeholder="記事タイトル" oninput="autoSlug()">
          <input class="meta-input" id="slug-input" placeholder="slug（URLに使用）">
        </div>
        <input class="meta-input" id="tags-input" placeholder="タグ（カンマ区切り）　例: JavaScript, Firebase">
      </div>

      <!-- ツールバー -->
      <div class="toolbar">
        <!-- 基本書式 -->
        <button class="tb-btn" onclick="ins('**','**')" title="太字"><b>B</b></button>
        <button class="tb-btn" onclick="ins('*','*')" title="斜体"><i>I</i></button>
        <button class="tb-btn" onclick="ins('~~','~~')" title="取り消し線"><s>S</s></button>
        <button class="tb-btn" onclick="ins('`','`')" title="インラインコード">code</button>
        <div class="tb-sep"></div>
        <!-- 見出し -->
        <button class="tb-btn" onclick="insLine('# ')" title="見出し1">H1</button>
        <button class="tb-btn" onclick="insLine('## ')" title="見出し2">H2</button>
        <button class="tb-btn" onclick="insLine('### ')" title="見出し3">H3</button>
        <div class="tb-sep"></div>
        <!-- リスト -->
        <button class="tb-btn" onclick="insLine('- ')" title="リスト">リスト</button>
        <button class="tb-btn" onclick="insLine('1. ')" title="番号リスト">番号</button>
        <button class="tb-btn" onclick="insLine('> ')" title="引用">引用</button>
        <button class="tb-btn" onclick="ins('\n```\n','\n```\n')" title="コードブロック">```</button>
        <button class="tb-btn" onclick="ins('[','](url)')" title="リンク">リンク</button>
        <div class="tb-sep"></div>
        <!-- 色 -->
        <div style="position:relative">
          <button class="tb-btn" onclick="toggleColorPopup(event)" title="文字色">🎨 色</button>
          <div class="color-popup" id="color-popup">
            <div style="font-size:11px;color:var(--text-muted);margin-bottom:8px;font-weight:600">文字色</div>
            <div class="color-grid" id="color-grid"></div>
            <div style="display:flex;gap:6px;align-items:center">
              <input type="color" id="custom-color" style="width:28px;height:28px;border:none;padding:0;cursor:pointer;border-radius:4px">
              <button class="tb-btn" onclick="applyCustomColor()" style="font-size:11px">カスタム色</button>
            </div>
          </div>
        </div>
        <!-- サイズ -->
        <div style="position:relative">
          <button class="tb-btn" onclick="toggleSizePopup(event)" title="文字サイズ">Aサイズ</button>
          <div class="size-popup" id="size-popup">
            <button class="size-item" style="font-size:11px" onclick="applySize('xs')">極小 (xs)</button>
            <button class="size-item" style="font-size:13px" onclick="applySize('sm')">小 (sm)</button>
            <button class="size-item" style="font-size:15px" onclick="applySize('md')">中 (md)</button>
            <button class="size-item" style="font-size:18px" onclick="applySize('lg')">大 (lg)</button>
            <button class="size-item" style="font-size:22px" onclick="applySize('xl')">特大 (xl)</button>
            <button class="size-item" style="font-size:26px" onclick="applySize('xxl')">最大 (xxl)</button>
          </div>
        </div>
        <!-- マーカー・ブロック -->
        <button class="tb-btn" onclick="insWrap('{mark}','{/mark}')" title="マーカー">マーカー</button>
        <button class="tb-btn" onclick="insWrap('{info}','{/info}')" title="情報ブロック" style="color:#6c8bef">INFO</button>
        <button class="tb-btn" onclick="insWrap('{warn}','{/warn}')" title="警告ブロック" style="color:#efb46c">WARN</button>
        <button class="tb-btn" onclick="insWrap('{danger}','{/danger}')" title="危険ブロック" style="color:#ef6c6c">DANGER</button>
        <div class="tb-sep"></div>
        <!-- ファイル -->
        <button class="tb-btn" onclick="openImgModal()" title="画像をアップロード">🖼 画像</button>
        <button class="tb-btn" onclick="openResizeModal()" title="画像サイズ変更">↔</button>
        <button class="tb-btn" onclick="document.getElementById('md-file-input').click()" title=".mdファイルを読み込む">📄 .md</button>
        <input type="file" id="md-file-input" accept=".md,.markdown,text/markdown" style="display:none" onchange="loadMdFile(event)">
      </div>

      <textarea class="editor-textarea" id="editor" placeholder="Markdown で記事を書く..." oninput="updatePreview()"></textarea>
    </div>

    <div class="editor-right">
      <div class="preview-label">プレビュー</div>
      <div class="preview-body" id="preview"></div>
    </div>
  </div>

  <!-- 画像アップロードモーダル -->
  <div class="img-modal-overlay" id="img-modal" onclick="if(event.target===this)closeImgModal()">
    <div class="img-modal">
      <div style="font-size:16px;font-weight:700;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center">
        画像を挿入 <button onclick="closeImgModal()" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:20px">✕</button>
      </div>
      <div class="img-drop-zone" id="img-drop-zone" onclick="document.getElementById('img-file-input').click()" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
        <input type="file" id="img-file-input" accept="image/*" onchange="onFileSelect(event)">
        <div style="font-size:28px;margin-bottom:8px">📁</div>
        <div style="font-size:13px;color:var(--text-muted)" id="drop-text">クリックまたはドラッグ&ドロップ<br>PNG・JPG・GIF・WebP</div>
      </div>
      <div class="img-preview" id="img-preview"><img id="img-preview-img" src="" alt=""><div style="font-size:12px;color:var(--text-muted);margin-top:6px" id="img-preview-name"></div></div>
      <input class="modal-input" id="img-alt" placeholder="説明文（alt）※省略可">
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px">
        <input class="modal-input" id="img-width" type="number" placeholder="幅（px）※省略で元サイズ" style="margin-bottom:0;flex:1">
        <span style="font-size:13px;color:var(--text-muted)">px</span>
      </div>
      <button class="img-upload-btn" id="img-upload-btn" onclick="uploadImage()" disabled>アップロードして挿入</button>
      <div class="img-progress" id="img-progress"></div>
    </div>
  </div>

  <!-- 画像サイズ変更モーダル -->
  <div class="resize-modal-overlay" id="resize-modal" onclick="if(event.target===this)closeResizeModal()">
    <div class="resize-modal">
      <div style="font-size:16px;font-weight:700;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center">
        画像サイズを変更 <button onclick="closeResizeModal()" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:20px">✕</button>
      </div>
      <div id="resize-img-list" style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px;max-height:200px;overflow-y:auto">
        <div style="font-size:13px;color:var(--text-muted)">検出中...</div>
      </div>
      <div id="resize-editor" style="display:none">
        <div style="font-size:12px;color:var(--text-muted);margin-bottom:8px" id="resize-target-label"></div>
        <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px">
          <input class="modal-input" id="resize-width" type="number" placeholder="幅（px）" style="margin-bottom:0;flex:1">
          <span style="font-size:13px;color:var(--text-muted)">px</span>
        </div>
        <div style="display:flex;gap:8px">
          <button class="img-upload-btn" onclick="applyResize()" style="flex:1">適用</button>
          <button onclick="removeWidth()" style="flex:1;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text-muted);cursor:pointer;font-family:var(--font);font-size:14px;padding:11px">幅を削除</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 共有モーダル -->
  <div class="share-modal-overlay" id="share-modal" onclick="if(event.target===this)closeShareModal()">
    <div class="share-modal">
      <div style="font-size:16px;font-weight:700;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">
        編集者を管理 <button onclick="closeShareModal()" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:20px">✕</button>
      </div>
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:16px">追加した人はこの記事を編集できます。</div>
      <div id="share-user-list"><div style="color:var(--text-muted);font-size:13px">読み込み中...</div></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module">
    import { toggleTheme, updateToggleButton } from 'https://dasopedia.f5.si/js/theme.js';
    import { requireEditor } from 'https://dasopedia.f5.si/js/auth.js';
    import { db, rtdb } from 'https://dasopedia.f5.si/js/firebase.js';
    import { collection, doc, getDoc, addDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { ref, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
    import { applyCustomMarkdown } from 'https://dasopedia.f5.si/js/custom-markdown.js';

    window.themeToggle = toggleTheme;
    updateToggleButton();

    let currentUser, currentUserData;
    let isPublic = false;
    let editors  = [];
    let allUsers = {};
    const params    = new URLSearchParams(location.search);
    const articleId = params.get('id') || null;
    if (articleId) document.getElementById('nav-mode').textContent = '記事を編集';

    // テーマ変更時にhighlight.jsテーマも切り替え
    const origToggle = window.themeToggle;
    window.themeToggle = function() { origToggle(); updateHljsTheme(); };
    function updateHljsTheme() {
      const dark = document.documentElement.getAttribute('data-theme') === 'dark';
      document.getElementById('hljs-light').disabled = dark;
      document.getElementById('hljs-dark').disabled  = !dark;
    }
    updateHljsTheme();

    // ===== トースト =====
    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg; t.className = `toast show ${type}`;
      setTimeout(() => t.className = 'toast', 3000);
    }

    // ===== プレビュー =====
    window.updatePreview = function() {
      const content = document.getElementById('editor').value || '';
      let html = marked.parse(content);
      html = applyCustomMarkdown(html);
      document.getElementById('preview').innerHTML = html;
      document.querySelectorAll('#preview pre code').forEach(el => hljs.highlightElement(el));
    };

    // ===== slug自動生成 =====
    window.autoSlug = function() {
      if (articleId) return;
      const slug = document.getElementById('title-input').value
        .toLowerCase()
        .replace(/[^\w\u3040-\u309f\u30a0-\u30ff\u4e00-\u9faf\s-]/g, '')
        .replace(/\s+/g, '-').replace(/-+/g, '-').trim();
      document.getElementById('slug-input').value = slug;
    };

    // ===== ツールバー操作 =====
    function getTA() { return document.getElementById('editor'); }

    window.ins = function(before, after) {
      const ta = getTA(), s = ta.selectionStart, e = ta.selectionEnd;
      ta.value = ta.value.slice(0,s) + before + ta.value.slice(s,e) + after + ta.value.slice(e);
      ta.setSelectionRange(s+before.length, e+before.length);
      ta.focus(); updatePreview();
    };

    window.insLine = function(prefix) {
      const ta = getTA(), s = ta.selectionStart;
      const ls = ta.value.lastIndexOf('\n', s-1) + 1;
      ta.value = ta.value.slice(0,ls) + prefix + ta.value.slice(ls);
      ta.setSelectionRange(s+prefix.length, s+prefix.length);
      ta.focus(); updatePreview();
    };

    window.insWrap = function(before, after) {
      const ta = getTA(), s = ta.selectionStart, e = ta.selectionEnd;
      const sel = ta.value.slice(s,e) || 'テキスト';
      ta.value = ta.value.slice(0,s) + before + sel + after + ta.value.slice(e);
      ta.setSelectionRange(s+before.length, s+before.length+sel.length);
      ta.focus(); updatePreview();
    };

    // ===== 色ツールバー =====
    const COLORS = {
      red:'#ef6c6c', blue:'#6c8bef', green:'#6cefb0', yellow:'#efb46c',
      orange:'#f0965a', purple:'#b06cef', pink:'#ef6cb0', gray:'#7b7f96',
    };
    const colorGrid = document.getElementById('color-grid');
    Object.entries(COLORS).forEach(([name, hex]) => {
      const btn = document.createElement('button');
      btn.className = 'tb-color';
      btn.style.background = hex;
      btn.title = name;
      btn.onclick = () => { applyColor(name); toggleColorPopup(); };
      colorGrid.appendChild(btn);
    });

    window.toggleColorPopup = function(e) {
      if (e) e.stopPropagation();
      document.getElementById('color-popup').classList.toggle('open');
      document.getElementById('size-popup').classList.remove('open');
    };
    window.toggleSizePopup = function(e) {
      if (e) e.stopPropagation();
      document.getElementById('size-popup').classList.toggle('open');
      document.getElementById('color-popup').classList.remove('open');
    };

    window.applyColor = function(name) {
      insWrap(`{${name}}`, `{/${name}}`);
      document.getElementById('color-popup').classList.remove('open');
    };
    window.applyCustomColor = function() {
      const hex = document.getElementById('custom-color').value;
      insWrap(`{color:${hex}}`, `{/color}`);
      document.getElementById('color-popup').classList.remove('open');
    };
    window.applySize = function(name) {
      insWrap(`{${name}}`, `{/${name}}`);
      document.getElementById('size-popup').classList.remove('open');
    };

    // ===== .mdファイル読み込み =====
    window.loadMdFile = function(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        document.getElementById('editor').value = ev.target.result;
        updatePreview();
        showToast(`${file.name} を読み込みました`);
      };
      reader.readAsText(file);
      e.target.value = '';
    };

    // ===== 公開/非公開 =====
    function syncVisibilityUI() {
      const tog = document.getElementById('visibility-toggle');
      const lbl = document.getElementById('visibility-label');
      tog.classList.toggle('public', isPublic);
      lbl.textContent = isPublic ? '公開' : '非公開';
    }
    window.toggleVisibility = function() { isPublic = !isPublic; syncVisibilityUI(); };

    // ===== 共有モーダル =====
    window.openShareModal = function() {
      document.getElementById('share-modal').classList.add('open');
      renderShareList();
    };
    window.closeShareModal = () => document.getElementById('share-modal').classList.remove('open');

    function renderShareList() {
      const list = document.getElementById('share-user-list');
      const rows = Object.entries(allUsers).filter(([, u]) => u.role !== 'banned' && !u.noShare);
      list.innerHTML = rows.map(([uid, u]) => {
        const isEditor  = editors.includes(uid);
        const isAdminUp = ['owner','admin'].includes(u.role);
        const isMe      = uid === currentUser?.uid;
        const initial   = (u.displayName || '?').charAt(0).toUpperCase();
        let action = '';
        if (isMe || isAdminUp) action = `<span style="font-size:11px;color:var(--text-muted);padding:4px 8px">${isMe ? '作成者' : '常時編集可'}</span>`;
        else if (isEditor) action = `<button class="share-btn-remove" onclick="removeEditor('${uid}')">削除</button>`;
        else action = `<button class="share-btn-add" onclick="addEditor('${uid}')">追加</button>`;
        return `<div class="share-user-row">
          <div class="share-user-info">
            <div class="share-avatar">${initial}</div>
            <div><div style="font-size:14px;font-weight:500">${u.displayName || '-'}</div><div style="font-size:11px;color:var(--text-muted)">${u.role}</div></div>
          </div>${action}</div>`;
      }).join('');
    }
    window.addEditor    = uid => { if (!editors.includes(uid)) { editors.push(uid); renderShareList(); } };
    window.removeEditor = uid => { editors = editors.filter(e => e !== uid); renderShareList(); };

    // ===== 画像アップロード =====
    let selectedFile = null;
    let githubConfig = null;

    async function loadGithubConfig() {
      if (githubConfig) return githubConfig;
      const snap = await get(ref(rtdb, 'config/github'));
      if (!snap.exists()) throw new Error('GitHub設定が見つかりません');
      githubConfig = snap.val();
      return githubConfig;
    }

    window.openImgModal = function() {
      selectedFile = null;
      document.getElementById('img-preview').style.display = 'none';
      document.getElementById('img-alt').value = '';
      document.getElementById('img-width').value = '';
      document.getElementById('img-upload-btn').disabled = true;
      document.getElementById('img-progress').className = 'img-progress';
      document.getElementById('img-file-input').value = '';
      document.getElementById('img-modal').classList.add('open');
    };
    window.closeImgModal = () => document.getElementById('img-modal').classList.remove('open');

    window.onDragOver  = e => { e.preventDefault(); document.getElementById('img-drop-zone').classList.add('drag-over'); };
    window.onDragLeave = () => document.getElementById('img-drop-zone').classList.remove('drag-over');
    window.onDrop      = e => { e.preventDefault(); document.getElementById('img-drop-zone').classList.remove('drag-over'); const f = e.dataTransfer.files[0]; if (f?.type.startsWith('image/')) setFile(f); };
    window.onFileSelect = e => { const f = e.target.files[0]; if (f) setFile(f); };

    function setFile(file) {
      selectedFile = file;
      const reader = new FileReader();
      reader.onload = ev => {
        document.getElementById('img-preview-img').src = ev.target.result;
        document.getElementById('img-preview').style.display = 'block';
        document.getElementById('img-preview-name') && (document.getElementById('img-preview-name').textContent = file.name);
      };
      reader.readAsDataURL(file);
      document.getElementById('img-upload-btn').disabled = false;
    }

    window.uploadImage = async function() {
      if (!selectedFile) return;
      const btn = document.getElementById('img-upload-btn');
      const prog = document.getElementById('img-progress');
      btn.disabled = true; btn.textContent = 'アップロード中...';
      prog.textContent = 'GitHub設定を読み込み中...'; prog.className = 'img-progress show';
      try {
        const cfg = await loadGithubConfig();
        const safeName = selectedFile.name.replace(/[^a-zA-Z0-9._-]/g, '_');
        const filename = `images/${Date.now()}_${safeName}`;
        const apiUrl   = `https://api.github.com/repos/${cfg.repo}/contents/${filename}`;
        prog.textContent = '変換中...';
        const base64 = await new Promise((res, rej) => {
          const r = new FileReader();
          r.onload = () => res(r.result.split(',')[1]);
          r.onerror = rej;
          r.readAsDataURL(selectedFile);
        });
        prog.textContent = 'GitHubにアップロード中...';
        const res = await fetch(apiUrl, {
          method: 'PUT',
          headers: { 'Authorization': `token ${cfg.token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: `Upload: ${safeName}`, content: base64, branch: cfg.branch || 'main' })
        });
        if (!res.ok) { const err = await res.json(); throw new Error(err.message); }
        const rawUrl = `https://raw.githubusercontent.com/${cfg.repo}/${cfg.branch || 'main'}/${filename}`;
        const alt   = document.getElementById('img-alt').value.trim() || safeName;
        const width = document.getElementById('img-width').value.trim();
        const tag   = width ? `<img src="${rawUrl}" alt="${alt}" width="${width}">` : `<img src="${rawUrl}" alt="${alt}">`;
        const ta = getTA(), s = ta.selectionStart;
        ta.value = ta.value.slice(0,s) + tag + ta.value.slice(s);
        ta.setSelectionRange(s+tag.length, s+tag.length);
        ta.focus(); updatePreview();
        showToast('画像をアップロードしました！');
        closeImgModal();
      } catch(e) {
        prog.textContent = `エラー: ${e.message}`; prog.style.color = 'var(--error)';
        btn.disabled = false; btn.textContent = 'アップロードして挿入';
      }
    };

    // ===== 画像サイズ変更 =====
    let selectedImgIndex = -1, detectedImgs = [];

    function detectImgs() {
      const val = getTA().value, re = /<img[^>]*>/g;
      detectedImgs = [];
      let m;
      while ((m = re.exec(val)) !== null) {
        const tag   = m[0];
        const src   = (tag.match(/src="([^"]*)"/) || [])[1] || '';
        const alt   = (tag.match(/alt="([^"]*)"/) || [])[1] || '';
        const width = (tag.match(/width="([^"]*)"/) || [])[1] || '';
        const name  = src.split('/').pop().slice(0, 40);
        detectedImgs.push({ tag, start: m.index, end: m.index + tag.length, src, alt, width, name });
      }
      return detectedImgs;
    }

    window.openResizeModal = function() {
      selectedImgIndex = -1;
      document.getElementById('resize-editor').style.display = 'none';
      const imgs = detectImgs();
      const list = document.getElementById('resize-img-list');
      if (!imgs.length) { list.innerHTML = '<div style="font-size:13px;color:var(--text-muted);text-align:center;padding:16px">画像が見つかりません</div>'; }
      else {
        list.innerHTML = imgs.map((img, i) =>
          `<button onclick="selectImg(${i})" style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;text-align:left;cursor:pointer;font-family:var(--font);width:100%">
            <div style="font-size:13px;font-weight:600;margin-bottom:2px">${img.alt || img.name || '画像'+(i+1)}</div>
            <div style="font-size:11px;color:var(--text-muted)">${img.width ? '現在: '+img.width+'px' : '幅指定なし'}</div>
          </button>`
        ).join('');
      }
      document.getElementById('resize-modal').classList.add('open');
    };
    window.closeResizeModal = () => document.getElementById('resize-modal').classList.remove('open');
    window.selectImg = function(i) {
      selectedImgIndex = i;
      const img = detectedImgs[i];
      document.getElementById('resize-width').value = img.width || '';
      document.getElementById('resize-target-label').textContent = '対象: ' + (img.alt || img.name || '画像'+(i+1));
      document.getElementById('resize-editor').style.display = 'block';
    };
    window.applyResize = function() {
      const width = document.getElementById('resize-width').value.trim();
      if (!width || selectedImgIndex < 0) return;
      const fresh = detectImgs()[selectedImgIndex];
      if (!fresh) return;
      let newTag = fresh.tag;
      newTag = /width="[^"]*"/.test(newTag) ? newTag.replace(/width="[^"]*"/, `width="${width}"`) : newTag.replace('<img ', `<img width="${width}" `);
      const ta = getTA();
      ta.value = ta.value.slice(0, fresh.start) + newTag + ta.value.slice(fresh.end);
      updatePreview(); closeResizeModal();
    };
    window.removeWidth = function() {
      if (selectedImgIndex < 0) return;
      const fresh = detectImgs()[selectedImgIndex];
      if (!fresh) return;
      const newTag = fresh.tag.replace(/\s*width="[^"]*"/, '');
      const ta = getTA();
      ta.value = ta.value.slice(0, fresh.start) + newTag + ta.value.slice(fresh.end);
      updatePreview(); closeResizeModal();
    };


    // ===== 自動保存 =====
    const AUTOSAVE_KEY    = 'dasopedia-autosave';
    const AUTOSAVE_INT_KEY = 'dasopedia-autosave-interval';
    let autosaveTimer   = null;
    let lastSavedContent = '';

    function getAutosaveEnabled()  { return localStorage.getItem(AUTOSAVE_KEY) !== 'false'; }
    function getAutosaveInterval() { return parseInt(localStorage.getItem(AUTOSAVE_INT_KEY) || '60') * 1000; }

    function showAutosaveStatus(msg, color = 'var(--text-muted)') {
      const el = document.getElementById('autosave-indicator');
      el.textContent = msg;
      el.style.color = color;
      el.style.display = 'block';
    }

    function scheduleAutosave() {
      if (autosaveTimer) clearTimeout(autosaveTimer);
      if (!getAutosaveEnabled()) return;
      autosaveTimer = setTimeout(async () => {
        const content = document.getElementById('editor').value;
        if (!content.trim()) return;
        if (content === lastSavedContent) { showAutosaveStatus('変更なし'); return; }
        showAutosaveStatus('自動保存中...');
        try {
          await doSaveQuiet();
          lastSavedContent = content;
          showAutosaveStatus('自動保存済み ✓', 'var(--success, #2a9d6f)');
          setTimeout(() => { document.getElementById('autosave-indicator').style.display = 'none'; }, 3000);
        } catch(e) {
          showAutosaveStatus('自動保存失敗', 'var(--error)');
        }
      }, getAutosaveInterval());
    }

    // エディタ変更時に自動保存をスケジュール
    const origUpdatePreview = window.updatePreview;
    window.updatePreview = function() {
      origUpdatePreview();
      scheduleAutosave();
    };

    async function doSaveQuiet() {
      const title   = document.getElementById('title-input').value.trim();
      const slug    = document.getElementById('slug-input').value.trim();
      const content = document.getElementById('editor').value;
      const tags    = document.getElementById('tags-input').value.split(',').map(t => t.trim()).filter(Boolean);
      if (!title || !slug || !content.trim()) return;
      const contentText = content.replace(/[#*`_~\[\]()>!{}]/g, '').replace(/\s+/g, ' ').trim();
      if (articleId) {
        await updateDoc(doc(db, 'articles', articleId), { title, slug, content, contentText, tags, isPublic, editors, updatedAt: serverTimestamp() });
      }
      // 新規記事は自動保存しない（slugが重複する可能性があるため）
    }

    // 初期化時に自動保存インジケーター表示
    if (getAutosaveEnabled()) {
      const intSec = getAutosaveInterval() / 1000;
      showAutosaveStatus(`自動保存: ${intSec}秒ごと`);
      setTimeout(() => { document.getElementById('autosave-indicator').style.display = 'none'; }, 2000);
    }

    // ===== 保存 =====
    window.doSave = async function() {
      const title   = document.getElementById('title-input').value.trim();
      const slug    = document.getElementById('slug-input').value.trim();
      const content = getTA().value;
      const tags    = document.getElementById('tags-input').value.split(',').map(t => t.trim()).filter(Boolean);
      if (!title)  { showToast('タイトルを入力してください。', 'error'); return; }
      if (!slug)   { showToast('スラグを入力してください。', 'error'); return; }
      if (!content.trim()) { showToast('本文を入力してください。', 'error'); return; }
      const btn = document.getElementById('saveBtn');
      btn.disabled = true; btn.textContent = '保存中...';
      const contentText = content.replace(/[#*`_~\[\]()>!{}]/g, '').replace(/\s+/g, ' ').trim();
      try {
        if (articleId) {
          await updateDoc(doc(db, 'articles', articleId), { title, slug, content, contentText, tags, isPublic, editors, updatedAt: serverTimestamp() });
          showToast('保存しました！');
        } else {
          await addDoc(collection(db, 'articles'), {
            title, slug, content, contentText, tags, isPublic, editors,
            createdBy: currentUser.uid,
            createdByName: currentUserData.displayName || currentUser.displayName || '',
            createdAt: serverTimestamp(), updatedAt: serverTimestamp()
          });
          showToast('記事を作成しました！');
          setTimeout(() => window.location.href = `/wiki/article/?slug=${encodeURIComponent(slug)}`, 1200);
        }
      } catch(e) { showToast(`保存に失敗しました: ${e.message}`, 'error'); }
      btn.disabled = false; btn.textContent = '保存';
    };

    // Cmd/Ctrl+S で保存
    document.addEventListener('keydown', e => { if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); doSave(); } });

    // ===== 初期化 =====
    requireEditor(async (user, userData) => {
      currentUser = user; currentUserData = userData;
      try {
        const snap = await get(ref(rtdb, 'users'));
        if (snap.exists()) allUsers = snap.val();
      } catch(e) {}
      if (articleId) {
        document.getElementById('share-btn').style.display = 'block';
        try {
          const snap = await getDoc(doc(db, 'articles', articleId));
          if (snap.exists()) {
            const d = snap.data();
            document.getElementById('title-input').value = d.title || '';
            document.getElementById('slug-input').value  = d.slug  || '';
            document.getElementById('tags-input').value  = (d.tags || []).join(', ');
            getTA().value = d.content || '';
            isPublic = d.isPublic || false;
            editors  = d.editors  || [];
            syncVisibilityUI();
            updatePreview();
          }
        } catch(e) { showToast('記事の読み込みに失敗しました。', 'error'); }
      }
    });
  </script>
</body>
</html>
