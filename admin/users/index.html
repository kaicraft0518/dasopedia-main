<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ユーザー管理 — Dasopedia</title>
  <script>(function() { const t = localStorage.getItem('dasopedia-theme') || 'light'; document.documentElement.setAttribute('data-theme', t); })();</script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    [data-theme="light"] { --bg: #f5f6fa; --surface: #ffffff; --border: #e2e4ed; --accent: #4f6de0; --accent-hover: #3d5acc; --text: #1a1d2e; --text-muted: #6b7080; --error: #d63b3b; --success: #2a9d6f; --warn: #b07d00; --font: 'Inter', 'Hiragino Sans', sans-serif; }
    [data-theme="dark"]  { --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3e; --accent: #6c8bef; --accent-hover: #8aa3f5; --text: #e8eaf0; --text-muted: #7b7f96; --error: #ef6c6c; --success: #6cefb0; --warn: #efb46c; --font: 'Inter', 'Hiragino Sans', sans-serif; }
    body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; display: flex; flex-direction: column; }
    nav { background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 32px; height: 56px; position: sticky; top: 0; z-index: 100; }
    .nav-logo { font-size: 16px; font-weight: 700; color: var(--text); text-decoration: none; }
    .nav-logo span { color: var(--accent); }
    .nav-badge { background: var(--accent); border-radius: 4px; color: #fff; font-size: 10px; font-weight: 700; padding: 2px 6px; margin-left: 8px; }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .nav-link { color: var(--text-muted); font-size: 13px; text-decoration: none; }
    .nav-link:hover { color: var(--text); }
    .tb { background: none; border: 1px solid var(--border); border-radius: 7px; color: var(--text); cursor: pointer; font-size: 15px; padding: 5px 10px; }

    .main { max-width: 960px; margin: 0 auto; padding: 40px 24px; flex: 1; }
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.02em; }

    /* タブ */
    .tabs { display: flex; border: 1px solid var(--border); border-radius: 10px; padding: 4px; gap: 4px; margin-bottom: 24px; width: fit-content; }
    .tab { background: none; border: none; border-radius: 7px; color: var(--text-muted); cursor: pointer; font-family: var(--font); font-size: 13px; font-weight: 600; padding: 8px 18px; transition: all 0.15s; }
    .tab.active { background: var(--accent); color: #fff; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* テーブル */
    table { width: 100%; border-collapse: collapse; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    th { background: var(--bg); border-bottom: 1px solid var(--border); color: var(--text-muted); font-size: 12px; font-weight: 600; letter-spacing: 0.06em; padding: 12px 16px; text-align: left; text-transform: uppercase; }
    td { border-bottom: 1px solid var(--border); font-size: 14px; padding: 12px 16px; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }

    /* ロールバッジ */
    .role-badge { border-radius: 5px; font-size: 11px; font-weight: 700; padding: 3px 8px; letter-spacing: 0.04em; }
    .role-owner  { background: rgba(239,180,108,0.15); color: #b07d00; border: 1px solid rgba(239,180,108,0.4); }
    [data-theme="dark"] .role-owner { color: #efb46c; }
    .role-admin  { background: rgba(79,109,224,0.12); color: var(--accent); border: 1px solid rgba(79,109,224,0.3); }
    .role-editor { background: rgba(42,157,111,0.12); color: #2a9d6f; border: 1px solid rgba(42,157,111,0.3); }
    [data-theme="dark"] .role-editor { color: #6cefb0; }
    .role-viewer { background: rgba(107,112,128,0.1); color: var(--text-muted); border: 1px solid var(--border); }
    .role-banned { background: rgba(214,59,59,0.1); color: var(--error); border: 1px solid rgba(214,59,59,0.3); }

    select { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: var(--font); font-size: 13px; padding: 5px 8px; outline: none; cursor: pointer; }
    select:focus { border-color: var(--accent); }

    /* ボタン */
    .btn-sm-action { border: 1px solid var(--border); border-radius: 6px; cursor: pointer; font-family: var(--font); font-size: 12px; padding: 5px 10px; transition: all 0.15s; background: var(--bg); color: var(--text-muted); }
    .btn-sm-action:hover { border-color: var(--accent); color: var(--text); }
    .btn-ban { background: rgba(214,59,59,0.08); border: 1px solid rgba(214,59,59,0.25); border-radius: 6px; color: var(--error); cursor: pointer; font-family: var(--font); font-size: 12px; padding: 5px 10px; transition: background 0.15s; }
    .btn-ban:hover { background: rgba(214,59,59,0.18); }
    .btn-unban { background: rgba(42,157,111,0.08); border: 1px solid rgba(42,157,111,0.25); border-radius: 6px; color: var(--success); cursor: pointer; font-family: var(--font); font-size: 12px; padding: 5px 10px; }
    .btn-danger { background: rgba(214,59,59,0.08); border: 1px solid rgba(214,59,59,0.25); border-radius: 6px; color: var(--error); cursor: pointer; font-family: var(--font); font-size: 12px; padding: 5px 10px; transition: background 0.15s; }
    .btn-danger:hover { background: rgba(214,59,59,0.18); }

    /* 招待コードバッジ */
    .invite-status { border-radius: 5px; font-size: 11px; font-weight: 700; padding: 3px 8px; }
    .status-active   { background: rgba(42,157,111,0.1); color: var(--success); border: 1px solid rgba(42,157,111,0.3); }
    .status-used     { background: rgba(107,112,128,0.1); color: var(--text-muted); border: 1px solid var(--border); }
    .status-expired  { background: rgba(214,59,59,0.1); color: var(--error); border: 1px solid rgba(214,59,59,0.3); }
    .status-disabled { background: rgba(239,180,108,0.1); color: var(--warn); border: 1px solid rgba(239,180,108,0.3); }

    .header-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .btn-primary { background: var(--accent); border: none; border-radius: 7px; color: #fff; cursor: pointer; font-family: var(--font); font-size: 13px; font-weight: 600; padding: 8px 16px; transition: background 0.15s; }
    .btn-primary:hover { background: var(--accent-hover); }
    .help-btn { background: none; border: 1px solid var(--border); border-radius: 7px; color: var(--text-muted); cursor: pointer; font-family: var(--font); font-size: 13px; padding: 7px 14px; transition: border-color 0.15s; }
    .help-btn:hover { border-color: var(--accent); color: var(--text); }

    .empty { color: var(--text-muted); font-size: 14px; text-align: center; padding: 48px; }
    .code-mono { font-family: monospace; font-size: 13px; letter-spacing: 0.06em; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 2px 8px; cursor: pointer; }
    .code-mono:hover { border-color: var(--accent); }

    /* モーダル */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 16px; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 32px; width: 100%; max-width: 440px; }
    .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
    .modal-close { float: right; background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 20px; line-height: 1; }
    .modal-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .modal-label { font-size: 12px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-muted); }
    .modal-select { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: var(--font); font-size: 14px; padding: 10px 12px; outline: none; width: 100%; }
    .result-box { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 16px; display: none; }
    .result-code { font-family: monospace; font-size: 22px; font-weight: 700; letter-spacing: 0.12em; text-align: center; color: var(--accent); margin-bottom: 8px; }
    .result-meta { font-size: 12px; color: var(--text-muted); text-align: center; }
    .copy-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); cursor: pointer; font-family: var(--font); font-size: 13px; padding: 8px 16px; width: 100%; margin-top: 10px; transition: border-color 0.15s; }
    .copy-btn:hover { border-color: var(--accent); }

    /* ロール説明 */
    .role-row { display: flex; align-items: flex-start; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .role-row:last-child { border-bottom: none; }
    .role-icon { font-size: 20px; flex-shrink: 0; width: 28px; }
    .role-name { font-size: 13px; font-weight: 700; margin-bottom: 2px; }
    .role-desc { font-size: 12px; color: var(--text-muted); line-height: 1.5; }

    /* レスポンシブ */
    @media (max-width: 640px) {
      nav { padding: 0 16px; }
      .main { padding: 24px 16px; }
      .page-header { flex-direction: column; align-items: flex-start; gap: 12px; }
      .tabs { width: 100%; }
      .tab { flex: 1; text-align: center; }
      table { display: block; overflow-x: auto; font-size: 12px; }
      th, td { padding: 8px 10px; white-space: nowrap; }
      h1 { font-size: 20px; }
      .header-actions { width: 100%; }
      .header-actions button { flex: 1; }
    }
    #hamburger { display: none; }
    @media (max-width: 640px) {
      #hamburger { display: flex; align-items: center; justify-content: center; background: none; border: 1px solid var(--border); border-radius: 7px; color: var(--text); cursor: pointer; font-size: 18px; padding: 5px 10px; }
      #nav-menu { display: none; flex-direction: column; position: absolute; top: 56px; left: 0; right: 0; background: var(--surface); border-bottom: 1px solid var(--border); padding: 4px 0; z-index: 300; }
      #nav-menu.open { display: flex; }
      #nav-menu > * { width: 100% !important; padding: 12px 20px !important; border-bottom: 1px solid var(--border) !important; font-size: 14px !important; }
    }
  </style>
  <script>
    function toggleNav() { var m = document.getElementById('nav-menu'); if (m) m.classList.toggle('open'); }
    document.addEventListener('click', function(e) { if (!e.target.closest('nav')) { var m = document.getElementById('nav-menu'); if (m) m.classList.remove('open'); } });
  </script>
</head>
<body>
  <nav>
    <a class="nav-logo" href="/admin/"><span>D</span>asopedia <span class="nav-badge">ADMIN</span></a>
    <div class="nav-right">
      <a class="nav-link" href="/admin/">← 管理トップ</a>
      <button class="tb" id="theme-toggle" onclick="window.themeToggle()">🌙</button>
      <a class="nav-link" href="#" onclick="doLogout()">ログアウト</a>
      <button id="hamburger" onclick="toggleNav()">☰</button>
    </div>
  </nav>

  <div class="main">
    <div class="page-header">
      <h1>ユーザー管理</h1>
      <div class="header-actions" id="header-actions">
        <!-- タブに応じて切り替え -->
      </div>
    </div>

    <!-- タブ -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab('users')">👥 ユーザー一覧</button>
      <button class="tab" onclick="switchTab('invites')">✉️ 招待コード</button>
    </div>

    <!-- ユーザー一覧タブ -->
    <div class="tab-panel active" id="panel-users">
      <table>
        <thead><tr><th>表示名</th><th>メールアドレス</th><th>ロール</th><th>登録日</th><th>操作</th></tr></thead>
        <tbody id="user-tbody"><tr><td colspan="5" class="empty">読み込み中...</td></tr></tbody>
      </table>
    </div>

    <!-- 招待コードタブ -->
    <div class="tab-panel" id="panel-invites">
      <table>
        <thead><tr><th>コード</th><th>ロール</th><th>状態</th><th>有効期限</th><th>使用者</th><th>発行日</th><th>操作</th></tr></thead>
        <tbody id="invite-tbody"><tr><td colspan="7" class="empty">読み込み中...</td></tr></tbody>
      </table>
    </div>
  </div>

  <footer style="border-top:1px solid var(--border);padding:24px 32px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">
    <span style="font-size:12px;color:var(--text-muted)">© Dasopedia</span>
    <div style="display:flex;gap:16px">
      <a href="/legal/" style="font-size:12px;color:var(--text-muted);text-decoration:none">利用規約</a>
      <a href="/legal/privacy/" style="font-size:12px;color:var(--text-muted);text-decoration:none">プライバシーポリシー</a>
    </div>
  </footer>

  <!-- 招待コード発行モーダル -->
  <div class="modal-overlay" id="invite-modal" onclick="if(event.target===this)closeInviteModal()">
    <div class="modal">
      <button class="modal-close" onclick="closeInviteModal()">✕</button>
      <div class="modal-title">招待コードを発行</div>
      <div class="modal-field">
        <label class="modal-label">付与するロール</label>
        <select id="invite-role" class="modal-select">
          <option value="editor">editor（記事の作成・編集）</option>
          <option value="viewer">viewer（閲覧のみ）</option>
          <option value="admin" id="invite-admin-opt" style="display:none">admin（管理者）</option>
        </select>
      </div>
      <div class="modal-field">
        <label class="modal-label">有効期限</label>
        <select id="invite-expires" class="modal-select">
          <option value="86400000">24時間</option>
          <option value="604800000" selected>7日間</option>
          <option value="2592000000">30日間</option>
          <option value="0">無期限</option>
        </select>
      </div>
      <button class="btn-primary" style="width:100%;padding:12px;margin-bottom:16px" onclick="generateInvite()">コードを発行する</button>
      <div class="result-box" id="result-box">
        <div class="result-code" id="result-code"></div>
        <div class="result-meta" id="result-meta"></div>
        <button class="copy-btn" id="copy-btn" onclick="copyCode()">コードをコピー</button>
      </div>
    </div>
  </div>

  <!-- ロール説明モーダル -->
  <div class="modal-overlay" id="role-modal" onclick="if(event.target===this)closeRoleModal()">
    <div class="modal">
      <button class="modal-close" onclick="closeRoleModal()">✕</button>
      <div class="modal-title">ロールについて</div>
      <div class="role-row"><div class="role-icon">👑</div><div><div class="role-name">owner</div><div class="role-desc">全権限。adminの任命・解任ができる。1人のみ。</div></div></div>
      <div class="role-row"><div class="role-icon">🛡️</div><div><div class="role-name">admin</div><div class="role-desc">ユーザー管理・記事の強制削除・編集ができる。</div></div></div>
      <div class="role-row"><div class="role-icon">✏️</div><div><div class="role-name">editor</div><div class="role-desc">記事の作成・編集・削除（自分の記事のみ）ができる。</div></div></div>
      <div class="role-row"><div class="role-icon">👁️</div><div><div class="role-name">viewer</div><div class="role-desc">記事の閲覧のみ。編集はできない。</div></div></div>
      <div class="role-row"><div class="role-icon">🚫</div><div><div class="role-name">banned</div><div class="role-desc">アクセス制限中。ログインできない。</div></div></div>
    </div>
  </div>

  <script type="module">
    import { toggleTheme, updateToggleButton } from 'https://dasopedia.f5.si/js/theme.js';
    import { requireAdmin, logout } from 'https://dasopedia.f5.si/js/auth.js';
    import { rtdb } from 'https://dasopedia.f5.si/js/firebase.js';
    import { ref, get, update, set, remove } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

    window.themeToggle = toggleTheme;
    window.doLogout = logout;
    updateToggleButton();

    let myRole = '';
    let allUsers = {};

    // ===== タブ切り替え =====
    window.switchTab = function(tab) {
      document.querySelectorAll('.tab').forEach((t, i) => {
        t.classList.toggle('active', (i === 0 && tab === 'users') || (i === 1 && tab === 'invites'));
      });
      document.getElementById('panel-users').classList.toggle('active', tab === 'users');
      document.getElementById('panel-invites').classList.toggle('active', tab === 'invites');

      const actions = document.getElementById('header-actions');
      if (tab === 'users') {
        actions.innerHTML = `<button class="help-btn" onclick="openRoleModal()">❓ ロールについて</button>`;
      } else {
        actions.innerHTML = `<button class="btn-primary" onclick="openInviteModal()">+ 招待コードを発行</button>`;
        loadInvites();
      }
    };

    // ===== ユーザー一覧 =====
    const ROLES = ['admin', 'editor', 'viewer', 'banned'];

    function roleBadge(role) {
      return `<span class="role-badge role-${role}">${role}</span>`;
    }

    async function changeRole(uid, newRole) {
      if (!confirm(`ロールを「${newRole}」に変更しますか？`)) return;
      await update(ref(rtdb, `users/${uid}`), { role: newRole });
      location.reload();
    }

    async function toggleBan(uid, current) {
      const newRole = current === 'banned' ? 'viewer' : 'banned';
      if (!confirm(current === 'banned' ? 'BANを解除しますか？' : 'このユーザーをBANしますか？')) return;
      await update(ref(rtdb, `users/${uid}`), { role: newRole });
      location.reload();
    }

    window.changeRole = changeRole;
    window.toggleBan  = toggleBan;

    // ===== 招待コード一覧 =====
    async function loadInvites() {
      const tbody = document.getElementById('invite-tbody');
      tbody.innerHTML = '<tr><td colspan="7" class="empty">読み込み中...</td></tr>';
      const snap = await get(ref(rtdb, 'invites'));
      if (!snap.exists()) {
        tbody.innerHTML = '<tr><td colspan="7" class="empty">招待コードがありません。</td></tr>';
        return;
      }

      const invites = snap.val();
      const rows = Object.entries(invites).sort((a, b) => b[1].createdAt - a[1].createdAt);

      tbody.innerHTML = rows.map(([code, inv]) => {
        const now = Date.now();
        const isUsed    = !!inv.usedBy;
        const isExpired = inv.expiresAt && now > inv.expiresAt;
        const isDisabled = inv.disabled;

        let statusLabel, statusClass;
        if (isDisabled)     { statusLabel = '停止中'; statusClass = 'status-disabled'; }
        else if (isUsed)    { statusLabel = '使用済み'; statusClass = 'status-used'; }
        else if (isExpired) { statusLabel = '期限切れ'; statusClass = 'status-expired'; }
        else                { statusLabel = '有効'; statusClass = 'status-active'; }

        const expires = inv.expiresAt
          ? new Date(inv.expiresAt).toLocaleDateString('ja-JP')
          : '無期限';
        const created = inv.createdAt
          ? new Date(inv.createdAt).toLocaleDateString('ja-JP')
          : '-';
        const usedBy = inv.usedBy
          ? (allUsers[inv.usedBy]?.displayName || inv.usedBy.slice(0, 8) + '...')
          : '-';

        const canToggle = !isUsed;
        const toggleBtn = canToggle
          ? inv.disabled
            ? `<button class="btn-sm-action" onclick="enableInvite('${code}')">有効化</button>`
            : `<button class="btn-danger" onclick="disableInvite('${code}')">停止</button>`
          : '';

        return `<tr>
          <td><span class="code-mono" onclick="copyText('${code}',this)" title="クリックでコピー">${code}</span></td>
          <td>${roleBadge(inv.role)}</td>
          <td><span class="invite-status ${statusClass}">${statusLabel}</span></td>
          <td style="color:var(--text-muted);font-size:13px">${expires}</td>
          <td style="color:var(--text-muted);font-size:13px">${usedBy}</td>
          <td style="color:var(--text-muted);font-size:13px">${created}</td>
          <td style="display:flex;gap:6px;flex-wrap:wrap">
            ${toggleBtn}
            <button class="btn-danger" onclick="deleteInvite('${code}')">削除</button>
          </td>
        </tr>`;
      }).join('');
    }

    window.disableInvite = async function(code) {
      if (!confirm('このコードを停止しますか？')) return;
      await update(ref(rtdb, `invites/${code}`), { disabled: true });
      loadInvites();
    };

    window.enableInvite = async function(code) {
      await update(ref(rtdb, `invites/${code}`), { disabled: false });
      loadInvites();
    };

    window.deleteInvite = async function(code) {
      if (!confirm(`コード「${code}」を削除しますか？`)) return;
      await remove(ref(rtdb, `invites/${code}`));
      loadInvites();
    };

    window.copyText = function(text, el) {
      navigator.clipboard.writeText(text).then(() => {
        const orig = el.textContent;
        el.textContent = 'コピー済み';
        setTimeout(() => el.textContent = orig, 1500);
      });
    };

    // ===== 招待コード発行モーダル =====
    window.openInviteModal = function() {
      document.getElementById('invite-admin-opt').style.display = myRole === 'owner' ? 'block' : 'none';
      document.getElementById('result-box').style.display = 'none';
      document.getElementById('result-code').textContent = '';
      document.getElementById('invite-modal').classList.add('open');
    };
    window.closeInviteModal = () => document.getElementById('invite-modal').classList.remove('open');

    window.generateInvite = async function() {
      const role    = document.getElementById('invite-role').value;
      const expires = parseInt(document.getElementById('invite-expires').value);
      const chars   = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789';
      let code = '';
      for (let i = 0; i < 8; i++) code += chars[Math.floor(Math.random() * chars.length)];
      try {
        await set(ref(rtdb, `invites/${code}`), {
          role, createdAt: Date.now(),
          expiresAt: expires > 0 ? Date.now() + expires : null,
          disabled: false, usedBy: null, usedAt: null
        });
        document.getElementById('result-code').textContent = code;
        document.getElementById('result-meta').textContent =
          `ロール: ${role}　／　${expires > 0 ? '有効期限: ' + new Date(Date.now() + expires).toLocaleDateString('ja-JP') : '無期限'}`;
        document.getElementById('result-box').style.display = 'block';
        document.getElementById('copy-btn').textContent = 'コードをコピー';
      } catch (e) { alert(`エラー: ${e.message}`); }
    };

    window.copyCode = function() {
      const code = document.getElementById('result-code').textContent;
      navigator.clipboard.writeText(code).then(() => {
        document.getElementById('copy-btn').textContent = 'コピー済み！';
        setTimeout(() => document.getElementById('copy-btn').textContent = 'コードをコピー', 2000);
      });
    };

    // ===== ロール説明モーダル =====
    window.openRoleModal  = () => document.getElementById('role-modal').classList.add('open');
    window.closeRoleModal = () => document.getElementById('role-modal').classList.remove('open');

    // ===== 初期化 =====
    requireAdmin(async (user, userData) => {
      myRole = userData.role;

      // ヘッダーアクションの初期表示（ユーザータブ）
      document.getElementById('header-actions').innerHTML =
        `<button class="help-btn" onclick="openRoleModal()">❓ ロールについて</button>`;

      // ユーザー一覧読み込み
      const snap = await get(ref(rtdb, 'users'));
      const tbody = document.getElementById('user-tbody');
      if (!snap.exists()) { tbody.innerHTML = '<tr><td colspan="5" class="empty">ユーザーがいません。</td></tr>'; return; }

      allUsers = snap.val();
      tbody.innerHTML = '';

      Object.entries(allUsers).forEach(([uid, u]) => {
        const isMe    = uid === user.uid;
        const isOwner = u.role === 'owner';
        const canEdit = !isOwner && !isMe && (myRole === 'owner' || (myRole === 'admin' && u.role !== 'admin'));
        const date    = u.createdAt ? new Date(u.createdAt).toLocaleDateString('ja-JP') : '-';

        const roleOptions = (myRole === 'owner' ? ROLES : ROLES.filter(r => r !== 'admin'))
          .map(r => `<option value="${r}" ${u.role === r ? 'selected' : ''}>${r}</option>`).join('');
        const roleEl = canEdit
          ? `<select onchange="changeRole('${uid}', this.value)">${roleOptions}</select>`
          : roleBadge(u.role);

        const banBtn = canEdit
          ? u.role === 'banned'
            ? `<button class="btn-unban" onclick="toggleBan('${uid}','banned')">BAN解除</button>`
            : `<button class="btn-ban" onclick="toggleBan('${uid}','${u.role}')">BAN</button>`
          : '';

        tbody.innerHTML += `<tr>
          <td>${u.displayName || '-'}${isMe ? ' <span style="color:var(--accent);font-size:11px">(自分)</span>' : ''}</td>
          <td style="color:var(--text-muted)">${u.email || '-'}</td>
          <td>${roleEl}</td>
          <td style="color:var(--text-muted)">${date}</td>
          <td>${banBtn}</td>
        </tr>`;
      });
    });
  </script>
</body>
</html>
