<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>記事一覧 — Dasopedia</title>
  <script>(function(){ document.documentElement.setAttribute('data-theme', localStorage.getItem('dasopedia-theme') || 'light'); })();</script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    [data-theme="light"] { --bg: #f5f6fa; --surface: #ffffff; --border: #e2e4ed; --accent: #4f6de0; --accent-hover: #3d5acc; --text: #1a1d2e; --text-muted: #6b7080; --font: 'Inter', 'Hiragino Sans', sans-serif; }
    [data-theme="dark"]  { --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3e; --accent: #6c8bef; --accent-hover: #8aa3f5; --text: #e8eaf0; --text-muted: #7b7f96; --font: 'Inter', 'Hiragino Sans', sans-serif; }
    body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; display: flex; flex-direction: column; }
    nav { background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 32px; height: 56px; position: sticky; top: 0; z-index: 100; }
    .nav-logo { font-size: 16px; font-weight: 700; color: var(--text); text-decoration: none; }
    .nav-logo span { color: var(--accent); }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .nav-link { color: var(--text-muted); font-size: 13px; text-decoration: none; }
    .nav-link:hover { color: var(--text); }
    .btn-sm { background: var(--accent); border: none; border-radius: 7px; color: #fff; cursor: pointer; font-family: var(--font); font-size: 13px; font-weight: 600; padding: 7px 14px; text-decoration: none; }
    .btn-icon { background: none; border: 1px solid var(--border); border-radius: 7px; color: var(--text); cursor: pointer; font-size: 15px; padding: 5px 10px; }
    #hamburger { display: none; background: none; border: 1px solid var(--border); border-radius: 7px; color: var(--text); cursor: pointer; font-size: 18px; padding: 5px 10px; }
    .main { max-width: 900px; width: 100%; margin: 0 auto; padding: 40px 24px; flex: 1; }
    h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 24px; }
    .filters { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
    .filter-input { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: var(--font); font-size: 13px; padding: 8px 12px; outline: none; flex: 1; min-width: 160px; transition: border-color 0.15s; }
    .filter-input:focus { border-color: var(--accent); }
    .article-grid { display: grid; gap: 10px; }
    .article-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px 22px; text-decoration: none; color: var(--text); transition: border-color 0.15s; display: flex; justify-content: space-between; align-items: center; }
    .article-card:hover { border-color: var(--accent); }
    .article-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .article-meta { font-size: 12px; color: var(--text-muted); }
    .tags { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
    .tag { background: rgba(108,139,239,0.12); border: 1px solid rgba(108,139,239,0.25); border-radius: 4px; color: var(--accent); font-size: 11px; font-weight: 600; padding: 2px 8px; cursor: pointer; }
    .private-badge { background: rgba(239,180,108,0.12); border: 1px solid rgba(239,180,108,0.3); border-radius: 4px; color: #b07d00; font-size: 10px; font-weight: 700; padding: 2px 6px; margin-left: 6px; vertical-align: middle; }
    [data-theme="dark"] .private-badge { color: #efb46c; }
    .arrow { color: var(--text-muted); font-size: 18px; flex-shrink: 0; }
    .empty { color: var(--text-muted); font-size: 14px; text-align: center; padding: 48px; }
    .count { font-size: 13px; color: var(--text-muted); margin-bottom: 12px; }

    @media (max-width: 680px) {
      nav { padding: 0 16px; }
      .nav-right { display: none; }
      #hamburger { display: flex; align-items: center; justify-content: center; }
      #mobile-menu { display: none; flex-direction: column; position: absolute; top: 56px; left: 0; right: 0; background: var(--surface); border-bottom: 1px solid var(--border); padding: 4px 0; z-index: 300; }
      #mobile-menu.open { display: flex; }
      #mobile-menu .mob-item { padding: 13px 20px; font-size: 14px; color: var(--text-muted); text-decoration: none; border-bottom: 1px solid var(--border); display: block; }
      #mobile-menu .mob-item.accent { color: var(--accent); font-weight: 600; }
      #mobile-menu .mob-item.danger { color: #ef6c6c; }
      .main { padding: 24px 16px; }
      .filters { flex-direction: column; }
      .article-card { padding: 14px 16px; }
      h1 { font-size: 20px; }
    }
  </style>
  <script>
    function toggleMobileMenu() { document.getElementById('mobile-menu').classList.toggle('open'); }
    document.addEventListener('click', function(e) {
      if (!e.target.closest('nav') && !e.target.closest('#mobile-menu')) {
        var m = document.getElementById('mobile-menu');
        if (m) m.classList.remove('open');
      }
    });
  </script>
</head>
<body>
  <nav>
    <a class="nav-logo" href="/"><span>D</span>asopedia</a>
    <div class="nav-right">
      <a class="nav-link" href="/">ホーム</a>
      <a class="nav-link" href="/search/">検索</a>
      <a class="btn-sm" href="/edit/">+ 記事を書く</a>
      <button class="btn-icon" id="theme-toggle" onclick="window.themeToggle()">🌙</button>
      <a class="nav-link" href="#" onclick="doLogout()">ログアウト</a>
    </div>
    <button id="hamburger" onclick="toggleMobileMenu()">☰</button>
  </nav>

  <div id="mobile-menu">
    <a class="mob-item" href="/">ホーム</a>
    <a class="mob-item" href="/search/">検索</a>
    <a class="mob-item accent" href="/edit/">+ 記事を書く</a>
    <a class="mob-item" href="#" onclick="window.themeToggle()">🌙 テーマ切り替え</a>
    <a class="mob-item danger" href="#" onclick="doLogout()">ログアウト</a>
  </div>

  <div class="main">
    <h1>記事一覧</h1>
    <div class="filters">
      <input class="filter-input" id="filter-keyword" placeholder="タイトルで絞り込み..." oninput="renderList()">
      <input class="filter-input" id="filter-tag" placeholder="タグで絞り込み..." oninput="renderList()">
    </div>
    <div class="count" id="count"></div>
    <div class="article-grid" id="article-list"><div class="empty">読み込み中...</div></div>
  </div>

  <footer style="border-top:1px solid var(--border);padding:24px 32px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">
    <span style="font-size:12px;color:var(--text-muted)">© Dasopedia</span>
    <div style="display:flex;gap:16px">
      <a href="/legal/" style="font-size:12px;color:var(--text-muted);text-decoration:none">利用規約</a>
      <a href="/legal/privacy/" style="font-size:12px;color:var(--text-muted);text-decoration:none">プライバシーポリシー</a>
    </div>
  </footer>

  <script type="module">
    import { toggleTheme, updateToggleButton } from 'https://dasopedia.f5.si/js/theme.js';
    import { requireAuth, logout } from 'https://dasopedia.f5.si/js/auth.js';
    import { db } from 'https://dasopedia.f5.si/js/firebase.js';
    import { collection, query, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    window.themeToggle = toggleTheme;
    window.doLogout = logout;
    updateToggleButton();

    let allArticles = [];
    let currentUid  = '';
    let currentRole = '';

    function canSee(a) {
      // isPublicフィールドがない古い記事はデフォルトで表示
      if (!('isPublic' in a)) return true;
      if (a.isPublic) return true;
      // 非公開：作成者・editors・admin/owner のみ
      if (a.createdBy === currentUid) return true;
      if ((a.editors || []).includes(currentUid)) return true;
      if (['admin','owner'].includes(currentRole)) return true;
      return false;
    }

    window.renderList = function() {
      const kw  = document.getElementById('filter-keyword').value.trim().toLowerCase();
      const tag = document.getElementById('filter-tag').value.trim().toLowerCase();

      const filtered = allArticles.filter(a => {
        if (!canSee(a)) return false;
        return (!kw  || (a.title || '').toLowerCase().includes(kw)) &&
               (!tag || (a.tags || []).some(t => String(t).toLowerCase().includes(tag)));
      });

      const list = document.getElementById('article-list');
      document.getElementById('count').textContent = `${filtered.length} 件`;

      if (!filtered.length) { list.innerHTML = '<div class="empty">条件に一致する記事がありません。</div>'; return; }

      list.innerHTML = filtered.map(a => {
        const date     = a.updatedAt ? new Date(a.updatedAt.toMillis()).toLocaleDateString('ja-JP') : '';
        const tagsHtml = (a.tags || []).map(t =>
          `<span class="tag" onclick="event.preventDefault();document.getElementById('filter-tag').value='${t}';renderList()">${t}</span>`
        ).join('');
        const privateBadge = ('isPublic' in a) && !a.isPublic ? '<span class="private-badge">非公開</span>' : '';
        return `<a class="article-card" href="/wiki/article/?slug=${encodeURIComponent(a.slug || a.id)}">
          <div>
            <div class="article-title">${a.title || 'Untitled'}${privateBadge}</div>
            <div class="article-meta">${a.createdByName || '不明'} · ${date}</div>
            ${tagsHtml ? `<div class="tags">${tagsHtml}</div>` : ''}
          </div>
          <div class="arrow">›</div>
        </a>`;
      }).join('');
    };

    requireAuth(async (user, userData) => {
      currentUid  = user.uid;
      currentRole = userData.role || 'viewer';
      try {
        const snap = await getDocs(query(collection(db, 'articles'), orderBy('updatedAt', 'desc')));
        allArticles = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderList();
      } catch(e) {
        console.error(e);
        document.getElementById('article-list').innerHTML = '<div class="empty">記事の読み込みに失敗しました。</div>';
      }
    });
  </script>
</body>
</html>
